<div class="account-panel">
  <div class="account-panel__header">
    <span>Seguridad</span>
    <h2>Contraseña</h2>
    <p>Actualiza tu contraseña para mantener tu cuenta protegida.</p>
  </div>

  <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="account-form account-form--narrow">
    <div class="field">
      <label>Contraseña actual</label>
      <div class="input-wrap">
        <input [type]="showPassword ? 'text' : 'password'" formControlName="currentPassword" class="account-input has-icon">
        <button type="button" (click)="togglePasswordVisibility()" class="input-icon-button">
          <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
    </div>

    <div class="field">
      <label>Nueva contraseña</label>
      <input [type]="showPassword ? 'text' : 'password'" formControlName="newPassword" class="account-input">
      <p *ngIf="passwordForm.get('newPassword')?.hasError('pattern') && passwordForm.get('newPassword')?.touched" class="field-error">
        Debe tener 12+ caracteres, 1 mayúscula, 1 número y 1 símbolo.
      </p>
    </div>

    <div class="field">
      <label>Confirmar nueva contraseña</label>
      <input [type]="showPassword ? 'text' : 'password'" formControlName="confirmNewPassword" class="account-input">
      <p *ngIf="passwordForm.hasError('passwordsDoNotMatch') && passwordForm.get('confirmNewPassword')?.touched" class="field-error">
        Las contraseñas no coinciden.
      </p>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="!passwordForm.valid" class="account-submit">
        Guardar cambios
      </button>
    </div>
  </form>
</div>
