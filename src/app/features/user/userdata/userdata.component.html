<div class="account-panel">
  <div class="account-panel__header">
    <span>Información personal</span>
    <h2>Datos personales</h2>
    <p>Actualiza los datos principales de tu cuenta.</p>
  </div>

  <form [formGroup]="userdataForm" (ngSubmit)="onSubmit()" class="account-form">
    <div class="form-grid">
      <div class="field">
        <label>Nombre/s</label>
        <div class="input-wrap">
          <input formControlName="nombre" class="account-input has-icon">
          <mat-icon>person</mat-icon>
        </div>
        <p *ngIf="userdataForm.get('nombre')?.hasError('required') && userdataForm.get('nombre')?.touched" class="field-error">El nombre es requerido</p>
      </div>

      <div class="field">
        <label>Apellido paterno</label>
        <input formControlName="ap" class="account-input">
      </div>

      <div class="field">
        <label>Apellido materno</label>
        <input formControlName="am" class="account-input">
      </div>

      <div class="field">
        <label>Nombre de usuario</label>
        <div class="input-wrap">
          <input formControlName="username" class="account-input has-icon">
          <mat-icon>account_circle</mat-icon>
        </div>
        <p *ngIf="userdataForm.get('username')?.hasError('required') && userdataForm.get('username')?.touched" class="field-error">El usuario es requerido</p>
      </div>

      <div class="field field--wide">
        <label>Email <span>(No se puede cambiar)</span></label>
        <div class="input-wrap">
          <input formControlName="email" readonly class="account-input has-icon is-readonly">
          <mat-icon>email</mat-icon>
        </div>
      </div>

      <div class="field field--wide">
        <label>Teléfono</label>
        <div class="input-wrap">
          <input type="tel" formControlName="telefono" class="account-input has-icon">
          <mat-icon>phone</mat-icon>
        </div>
        <p *ngIf="userdataForm.get('telefono')?.hasError('required') && userdataForm.get('telefono')?.touched" class="field-error">El teléfono es requerido</p>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="!userdataForm.valid || !userdataForm.dirty" class="account-submit">
        Guardar cambios
      </button>
    </div>
  </form>
</div>
