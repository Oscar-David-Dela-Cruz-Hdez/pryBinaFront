<div class="admin-container w-full max-w-4xl mx-auto p-4 md:p-8 animate-slide-up transition-all duration-300 min-h-[calc(100vh-80px)]">
  <div class="mb-8 border-b border-[#e2dcd6] dark:border-[#333333] pb-4">
    <h2 class="text-3xl font-bold text-[#2C2C2C] dark:text-[#F0F0F0]">Gestión de Ubicación</h2>
  </div>
  <mat-card class="bg-[#FFFFFF] dark:bg-[#1E1E1E] rounded-2xl shadow-md shadow-black/5 dark:shadow-black/40 border border-[#e2dcd6]/30 dark:border-[#333333]/30 animate-fade-in">
    <mat-card-content class="p-6">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">

        <div class="field-admin">
          <label class="label-admin">Dirección</label>
          <input type="text" formControlName="direccion" placeholder="Calle, número, ciudad..." class="input-admin">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="field-admin">
            <label class="label-admin">Latitud</label>
            <input type="number" formControlName="latitud" class="input-admin" placeholder="19.4326">
          </div>
          <div class="field-admin">
            <label class="label-admin">Longitud</label>
            <input type="number" formControlName="longitud" class="input-admin" placeholder="-99.1332">
          </div>
        </div>

        <div class="field-admin">
          <label class="label-admin">URL Google Maps (Iframe/Embed)</label>
          <input type="url" formControlName="googleMapsUrl" placeholder="https://www.google.com/maps/embed..." class="input-admin">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="field-admin">
            <label class="label-admin">Teléfono</label>
            <input type="tel" formControlName="telefono" placeholder="+52..." class="input-admin">
          </div>
          <div class="field-admin">
            <label class="label-admin">Horario</label>
            <input type="text" formControlName="horario" placeholder="Lunes a Viernes 9am - 6pm" class="input-admin">
          </div>
        </div>

        <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-[#e2dcd6]/30 dark:border-[#333333]/30">
          <button type="submit" class="btn-admin-primary" [disabled]="isLoading">
            {{ isLoading ? 'Guardando...' : 'Guardar Cambios' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
