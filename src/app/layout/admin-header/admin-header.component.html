<header class="admin-header">
  <div class="admin-header__inner">
    <a routerLink="/admin/dashboard" class="admin-brand" aria-label="Panel administrador">
      <img src="assets/images/Panamericana.png" alt="Distribuidora Panamericana">
      <span>Admin</span>
    </a>

    <nav class="admin-nav" aria-label="Navegación de administración">
      <a routerLink="/admin/dashboard" class="admin-nav__link">
        <mat-icon>dashboard</mat-icon>
        Dashboard
      </a>

      <button class="admin-nav__link" [matMenuTriggerFor]="ventasMenu">
        <mat-icon>point_of_sale</mat-icon>
        Ventas
        <mat-icon class="chevron">expand_more</mat-icon>
      </button>
      <mat-menu #ventasMenu="matMenu" class="soft-menu">
        <button mat-menu-item routerLink="/admin/ventas/reportes"><mat-icon>bar_chart</mat-icon>Reportes</button>
        <button mat-menu-item routerLink="/admin/ventas/metodos-pago"><mat-icon>payments</mat-icon>Métodos de pago</button>
        <button mat-menu-item routerLink="/admin/ventas/ofertas"><mat-icon>local_offer</mat-icon>Ofertas</button>
        <button mat-menu-item routerLink="/admin/ventas/carrusel"><mat-icon>view_carousel</mat-icon>Carrusel</button>
      </mat-menu>

      <button class="admin-nav__link" [matMenuTriggerFor]="inventarioMenu">
        <mat-icon>inventory_2</mat-icon>
        Inventario
        <mat-icon class="chevron">expand_more</mat-icon>
      </button>
      <mat-menu #inventarioMenu="matMenu" class="soft-menu">
        <button mat-menu-item routerLink="/admin/inventario/productos"><mat-icon>category</mat-icon>Productos</button>
        <button mat-menu-item routerLink="/admin/inventario/marcas"><mat-icon>sell</mat-icon>Marcas</button>
        <button mat-menu-item routerLink="/admin/inventario/familias"><mat-icon>account_tree</mat-icon>Familias</button>
      </mat-menu>

      <button class="admin-nav__link" [matMenuTriggerFor]="pedidosMenu">
        <mat-icon>local_shipping</mat-icon>
        Pedidos
        <mat-icon class="chevron">expand_more</mat-icon>
      </button>
      <mat-menu #pedidosMenu="matMenu" class="soft-menu">
        <button mat-menu-item routerLink="/admin/pedidos/listado"><mat-icon>list_alt</mat-icon>Gestionar pedidos</button>
        <button mat-menu-item routerLink="/admin/pedidos/metodos-envio"><mat-icon>flight_takeoff</mat-icon>Métodos de envío</button>
      </mat-menu>

      <button class="admin-nav__link" [matMenuTriggerFor]="sitioMenu">
        <mat-icon>web</mat-icon>
        Sitio
        <mat-icon class="chevron">expand_more</mat-icon>
      </button>
      <mat-menu #sitioMenu="matMenu" class="soft-menu">
        <button mat-menu-item routerLink="/admin/sitio/mision"><mat-icon>flag</mat-icon>Misión</button>
        <button mat-menu-item routerLink="/admin/sitio/historia"><mat-icon>history_edu</mat-icon>Historia</button>
        <button mat-menu-item routerLink="/admin/sitio/vision"><mat-icon>visibility</mat-icon>Visión</button>
        <button mat-menu-item routerLink="/admin/sitio/politicas"><mat-icon>policy</mat-icon>Políticas</button>
        <button mat-menu-item routerLink="/admin/sitio/terminos"><mat-icon>gavel</mat-icon>Términos</button>
        <button mat-menu-item routerLink="/admin/sitio/ubicacion"><mat-icon>location_on</mat-icon>Ubicación</button>
        <button mat-menu-item routerLink="/admin/sitio/faqs"><mat-icon>quiz</mat-icon>FAQs</button>
        <button mat-menu-item routerLink="/admin/sitio/contactos"><mat-icon>contact_phone</mat-icon>Contactos</button>
      </mat-menu>

      <a routerLink="/admin/usuarios" class="admin-nav__link">
        <mat-icon>group</mat-icon>
        Usuarios
      </a>

      <button class="admin-nav__link" [matMenuTriggerFor]="toolsMenu">
        <mat-icon>build</mat-icon>
        Herramientas
        <mat-icon class="chevron">expand_more</mat-icon>
      </button>
      <mat-menu #toolsMenu="matMenu" class="soft-menu">
        <button mat-menu-item routerLink="/admin/herramientas"><mat-icon>import_export</mat-icon>Importar/Exportar</button>
        <button mat-menu-item routerLink="/admin/herramientas/respaldos"><mat-icon>backup</mat-icon>Respaldos</button>
        <button mat-menu-item routerLink="/admin/herramientas/monitoreo"><mat-icon>monitoring</mat-icon>Monitoreo</button>
        <button mat-menu-item routerLink="/admin/herramientas/alexa"><mat-icon>record_voice_over</mat-icon>Acceso Alexa</button>
      </mat-menu>
    </nav>

    <div class="admin-actions">
      <span class="admin-user">Hola, <strong>{{ adminName$ | async }}</strong></span>

      <button type="button" class="admin-icon-button" (click)="themeService.toggleTheme()"
        [title]="themeService.isDarkMode() ? 'Modo claro' : 'Modo oscuro'">
        <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <button class="admin-account" [matMenuTriggerFor]="userMenu" aria-label="Cuenta de administrador">
        <mat-icon>account_circle</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu" class="soft-menu">
        <div class="admin-menu-user">
          <span>Administrador</span>
          <strong>{{ adminName$ | async }}</strong>
        </div>
        <button mat-menu-item routerLink="/perfil"><mat-icon>person</mat-icon>Mi perfil</button>
        <button mat-menu-item class="logout-item" (click)="logout()"><mat-icon>logout</mat-icon>Cerrar sesión</button>
      </mat-menu>
    </div>
  </div>
</header>
