<div class="admin-container w-full max-w-6xl mx-auto p-4 md:p-6 lg:p-8 animate-fade-in transition-all duration-300 min-h-[calc(100vh-80px)] fade-in">
  <div class="mb-8 border-b border-[#e2dcd6] dark:border-[#333333] pb-4"><h2 class="text-3xl font-bold text-[#2C2C2C] dark:text-[#F0F0F0]">Respaldos de Base de Datos</h2></div>
  <p class="subtitle">Genera copias de seguridad de las colecciones activas del sistema.</p>

  <mat-card class="backup-card">
    <mat-card-header>
      <div mat-card-avatar class="header-icon warning-icon">
        <mat-icon>save</mat-icon>
      </div>
      <mat-card-title>Colecciones Disponibles</mat-card-title>
      <mat-card-subtitle>
        Selecciona los datos que deseas exportar al archivo .zip
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="pt-2">
      <div *ngIf="isLoading" class="loading-state">
        <mat-spinner diameter="40"></mat-spinner>
        <span>Cargando colecciones...</span>
      </div>

      <div *ngIf="!isLoading && colecciones.length === 0" class="empty-state">
        <p>No se encontraron colecciones disponibles.</p>
        <button mat-stroked-button class="!rounded-xl !py-2 !px-6 hover:bg-gray-50 dark:hover:bg-[#333333] transition-colors duration-300" color="primary" (click)="cargarColecciones()">Reintentar</button>
      </div>

      <div *ngIf="!isLoading && colecciones.length > 0" class="collections-list">
        <div class="select-all">
          <mat-checkbox 
            [checked]="allSelected" 
            [indeterminate]="someSelected"
            (change)="toggleAll($event)"
            color="primary">
            <b>Seleccionar Todas</b>
          </mat-checkbox>
        </div>
        
        <mat-divider></mat-divider>

        <div class="checkbox-grid animate-slide-up">
          <mat-checkbox 
            *ngFor="let col of colecciones" 
            [(ngModel)]="seleccionadas[col]" 
            color="primary">
            {{ col }}
          </mat-checkbox>
        </div>
      </div>
    </mat-card-content>

    <mat-card-actions class="actions-panel" *ngIf="!isLoading && colecciones.length > 0">
      <button mat-raised-button color="accent" (click)="descargarRespaldo()" [disabled]="isDownloading" class="download-btn hover:scale-[1.02] hover:-translate-y-1 active:scale-95 ease-out">
        <mat-icon>cloud_download</mat-icon> 
        <span>{{ isDownloading ? 'Generando ZIP...' : 'Descargar Respaldo' }}</span>
      </button>
    </mat-card-actions>
  </mat-card>
</div>
