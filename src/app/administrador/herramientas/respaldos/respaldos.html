<div class="admin-container fade-in">
  <h2>Respaldos de Base de Datos</h2>
  <p class="subtitle">Genera copias de seguridad de las colecciones activas del sistema.</p>

  <mat-card class="backup-card">
    <mat-card-header>
      <div mat-card-avatar class="header-icon warning-icon">
        <mat-icon>save</mat-icon>
      </div>
      <mat-card-title>Colecciones Disponibles</mat-card-title>
      <mat-card-subtitle>
        Selecciona los datos que deseas exportar al archivo .zip
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="pt-2">
      <div *ngIf="isLoading" class="loading-state">
        <mat-spinner diameter="40"></mat-spinner>
        <span>Cargando colecciones...</span>
      </div>

      <div *ngIf="!isLoading && colecciones.length === 0" class="empty-state">
        <p>No se encontraron colecciones disponibles.</p>
        <button mat-stroked-button color="primary" (click)="cargarColecciones()">Reintentar</button>
      </div>

      <div *ngIf="!isLoading && colecciones.length > 0" class="collections-list">
        <div class="select-all">
          <mat-checkbox 
            [checked]="allSelected" 
            [indeterminate]="someSelected"
            (change)="toggleAll($event)"
            color="primary">
            <b>Seleccionar Todas</b>
          </mat-checkbox>
        </div>
        
        <mat-divider></mat-divider>

        <div class="checkbox-grid">
          <mat-checkbox 
            *ngFor="let col of colecciones" 
            [(ngModel)]="seleccionadas[col]" 
            color="primary">
            {{ col }}
          </mat-checkbox>
        </div>
      </div>
    </mat-card-content>

    <mat-card-actions class="actions-panel" *ngIf="!isLoading && colecciones.length > 0">
      <button mat-raised-button color="accent" (click)="descargarRespaldo()" [disabled]="isDownloading" class="download-btn">
        <mat-icon>cloud_download</mat-icon> 
        <span>{{ isDownloading ? 'Generando ZIP...' : 'Descargar Respaldo' }}</span>
      </button>
    </mat-card-actions>
  </mat-card>
</div>
