<div class="admin-container w-full max-w-6xl mx-auto p-4 md:p-6 lg:p-8 animate-fade-in transition-all duration-300 min-h-[calc(100vh-80px)]">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 border-b border-[#e2dcd6] dark:border-[#333333] pb-4 gap-4">
    <h2 class="text-3xl font-bold text-[#2C2C2C] dark:text-[#F0F0F0]">Paquetería y Métodos de Envío</h2>
    <button class="btn-admin-primary" (click)="toggleForm()">
      <mat-icon>{{ showForm ? 'remove' : 'add' }}</mat-icon>
      {{ showForm ? 'Cancelar' : 'Nuevo Método' }}
    </button>
  </div>

  <!-- Formulario -->
  <mat-card *ngIf="showForm" class="mb-6 bg-[#FFFFFF] dark:bg-[#1E1E1E] rounded-2xl shadow-md shadow-black/5 dark:shadow-black/40 border border-[#e2dcd6]/30 dark:border-[#333333]/30 animate-fade-in">
    <mat-card-header class="p-6 pb-0">
      <mat-card-title class="text-xl font-semibold text-[#2C2C2C] dark:text-[#F0F0F0]">
        {{ isEditing ? 'Editar Método' : 'Agregar Método' }}
      </mat-card-title>
    </mat-card-header>
    <mat-card-content class="p-6">
      <form [formGroup]="shippingForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <div class="field-admin">
          <label class="label-admin">Nombre <span class="text-red-500">*</span></label>
          <input type="text" formControlName="nombre" placeholder="Ej: Envío Estándar" class="input-admin">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="field-admin">
            <label class="label-admin">Costo</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[#666666] dark:text-[#A0A0A0] font-medium">$</span>
              <input type="number" formControlName="costo" class="input-admin pl-7" placeholder="0.00">
            </div>
          </div>
          <div class="field-admin">
            <label class="label-admin">Tiempo Estimado</label>
            <input type="text" formControlName="tiempoEstimado" placeholder="Ej: 3-5 días" class="input-admin">
          </div>
        </div>

        <div class="field-admin">
          <label class="label-admin">Tipo</label>
          <input type="text" formControlName="tipo" placeholder="nacional, local, etc." class="input-admin">
        </div>

        <div class="field-admin">
          <label class="label-admin">Descripción</label>
          <textarea formControlName="descripcion" rows="2" class="textarea-admin" placeholder="Información adicional..."></textarea>
        </div>

        <div class="mb-2">
          <mat-slide-toggle formControlName="activo" color="primary">Activo</mat-slide-toggle>
        </div>

        <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-[#e2dcd6]/30 dark:border-[#333333]/30">
          <button type="button" class="btn-admin-secondary" (click)="toggleForm()">Cancelar</button>
          <button type="submit" class="btn-admin-primary" [disabled]="shippingForm.invalid || isLoading">
            {{ isLoading ? 'Guardando...' : (isEditing ? 'Actualizar' : 'Guardar') }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <!-- Lista -->
  <mat-card *ngIf="metodos.length > 0; else noData" class="bg-[#FFFFFF] dark:bg-[#1E1E1E] rounded-2xl shadow-md shadow-black/5 dark:shadow-black/40 border border-[#e2dcd6]/30 dark:border-[#333333]/30 animate-fade-in">
    <mat-list>
      <div *ngFor="let metodo of metodos" class="hover:bg-[#FAF8F5]/30 dark:hover:bg-[#2A2A2A]/30 transition-colors duration-200">
        <mat-list-item>
          <mat-icon matListItemIcon class="text-[#D4AF37] dark:text-[#E5C158]">local_shipping</mat-icon>
          <div matListItemTitle class="text-[#2C2C2C] dark:text-[#F0F0F0] font-medium">{{ metodo.nombre }}</div>
          <div matListItemLine class="text-[#666666] dark:text-[#A0A0A0]">
            {{ metodo.tiempoEstimado }} | {{ metodo.costo | currency }} | {{ metodo.tipo }}
          </div>
          <div matListItemMeta>
            <button mat-icon-button class="text-[#D4AF37] dark:text-[#E5C158] hover:scale-110 transition-transform" (click)="editMethod(metodo)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button class="text-[#F44336] hover:scale-110 transition-transform" (click)="deleteMethod(metodo)">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </mat-list-item>
        <mat-divider class="border-[#e2dcd6]/30 dark:border-[#333333]/30"></mat-divider>
      </div>
    </mat-list>
  </mat-card>

  <ng-template #noData>
    <div class="empty-state flex flex-col items-center justify-center gap-4 py-12 bg-[#FAF8F5]/50 dark:bg-[#2A2A2A]/50 rounded-2xl">
      <mat-icon class="text-4xl text-[#D4AF37] dark:text-[#E5C158]">flight_takeoff</mat-icon>
      <p class="text-[#666666] dark:text-[#A0A0A0]">No hay métodos de envío registrados.</p>
    </div>
  </ng-template>
</div>
