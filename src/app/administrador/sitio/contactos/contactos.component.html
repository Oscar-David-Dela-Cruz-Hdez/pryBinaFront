<div class="admin-container w-full max-w-4xl mx-auto p-4 md:p-8 animate-slide-up transition-all duration-300 min-h-[calc(100vh-80px)]">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 border-b border-[#e2dcd6] dark:border-[#333333] pb-4 gap-4">
    <h2 class="text-3xl font-bold text-[#2C2C2C] dark:text-[#F0F0F0]">Gestión de Contactos</h2>
    <button class="btn-admin-primary" (click)="toggleForm()">
      <mat-icon>{{ showForm ? 'remove' : 'add' }}</mat-icon>
      {{ showForm ? 'Cancelar' : 'Nuevo Contacto' }}
    </button>
  </div>

  <!-- Formulario -->
  <mat-card *ngIf="showForm" class="mb-6 bg-[#FFFFFF] dark:bg-[#1E1E1E] rounded-2xl shadow-md shadow-black/5 dark:shadow-black/40 border border-[#e2dcd6]/30 dark:border-[#333333]/30 animate-fade-in">
    <mat-card-header class="p-6 pb-0">
      <mat-card-title class="text-xl font-semibold text-[#2C2C2C] dark:text-[#F0F0F0]">
        {{ editingId ? 'Editar Contacto' : 'Agregar Nuevo Contacto' }}
      </mat-card-title>
    </mat-card-header>
    <mat-card-content class="p-6">
      <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <div class="field-admin">
          <label class="label-admin">Tipo <span class="text-red-500">*</span></label>
          <select formControlName="tipo" class="select-admin">
            <option value="" disabled selected>Selecciona un tipo</option>
            <option value="email">Email</option>
            <option value="telefono">Teléfono</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="facebook">Facebook</option>
            <option value="instagram">Instagram</option>
            <option value="twitter">Twitter/X</option>
            <option value="otro">Otro</option>
          </select>
        </div>

        <div class="field-admin">
          <label class="label-admin">Valor / Enlace <span class="text-red-500">*</span></label>
          <input type="text" formControlName="valor" placeholder="Ej: +52 55 1234 5678 o enlace al perfil" class="input-admin">
        </div>

        <div class="field-admin">
          <label class="label-admin">Ícono</label>
          <app-icon-picker
            iconSet="contact"
            [value]="contactForm.get('icono')?.value || ''"
            (iconSelected)="onIconSelected($event)">
          </app-icon-picker>
        </div>

        <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-[#e2dcd6]/30 dark:border-[#333333]/30">
          <button type="button" class="btn-admin-secondary" (click)="toggleForm()">Cancelar</button>
          <button type="submit" class="btn-admin-primary" [disabled]="contactForm.invalid || isLoading">
            {{ isLoading ? 'Guardando...' : (editingId ? 'Actualizar' : 'Guardar') }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <!-- Tabla de Contactos -->
  <div class="admin-data-table animate-fade-in" *ngIf="contactos.length > 0; else noData">
    <table>
      <thead>
        <tr class="admin-table-head">
          <th class="admin-th" style="width:56px">Ícono</th>
          <th class="admin-th">Tipo</th>
          <th class="admin-th">Valor / Enlace</th>
          <th class="admin-th text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let contacto of contactos" class="admin-table-row">
          <td class="admin-td">
            <div class="admin-thumb-placeholder">
              <mat-icon style="font-size:18px;width:18px;height:18px">{{ getIcon(contacto) }}</mat-icon>
            </div>
          </td>
          <td class="admin-td">
            <span class="badge-admin badge-active">{{ contacto.tipo | titlecase }}</span>
          </td>
          <td class="admin-td">
            <span class="font-medium text-[#2C2C2C] dark:text-[#F0F0F0]">{{ contacto.valor }}</span>
          </td>
          <td class="admin-td text-right">
            <button class="admin-btn-edit" (click)="editContacto(contacto)" title="Editar">
              <mat-icon style="font-size:18px;width:18px;height:18px">edit</mat-icon>
            </button>
            <button class="admin-btn-delete" (click)="deleteContacto(contacto._id)" title="Eliminar">
              <mat-icon style="font-size:18px;width:18px;height:18px">delete</mat-icon>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <ng-template #noData>
    <div class="empty-state flex flex-col items-center justify-center gap-4 py-12 bg-[#FAF8F5]/50 dark:bg-[#2A2A2A]/50 rounded-2xl">
      <mat-icon class="text-4xl text-[#D4AF37] dark:text-[#E5C158]">contact_phone</mat-icon>
      <p class="text-[#666666] dark:text-[#A0A0A0]">No hay contactos registrados.</p>
    </div>
  </ng-template>
</div>
