<div class="admin-container w-full max-w-4xl mx-auto p-4 md:p-8 animate-slide-up transition-all duration-300 min-h-[calc(100vh-80px)] fade-in">
      <div class="mb-8 border-b border-[#e2dcd6] dark:border-[#333333] pb-4"><h2 class="text-3xl font-bold text-[#2C2C2C] dark:text-[#F0F0F0]">Gestión de Ubicación</h2></div>
      
      <mat-card>
        <mat-card-content>
            <form [formGroup]="form" (ngSubmit)="onSubmit()">
                
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Dirección</mat-label>
                    <input matInput formControlName="direccion" placeholder="Calle, número, ciudad...">
                </mat-form-field>

                <div class="row">
                    <mat-form-field appearance="outline" class="half-width">
                        <mat-label>Latitud</mat-label>
                        <input matInput type="number" formControlName="latitud">
                    </mat-form-field>

                    <mat-form-field appearance="outline" class="half-width">
                        <mat-label>Longitud</mat-label>
                        <input matInput type="number" formControlName="longitud">
                    </mat-form-field>
                </div>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>URL Google Maps (Iframe/Embed)</mat-label>
                    <input matInput formControlName="googleMapsUrl" placeholder="https://www.google.com/maps/embed...">
                </mat-form-field>

                <div class="row">
                    <mat-form-field appearance="outline" class="half-width">
                        <mat-label>Teléfono</mat-label>
                        <input matInput formControlName="telefono" placeholder="+52...">
                    </mat-form-field>

                    <mat-form-field appearance="outline" class="half-width">
                        <mat-label>Horario</mat-label>
                        <input matInput formControlName="horario" placeholder="Lunes a Viernes 9am - 6pm">
                    </mat-form-field>
                </div>

                <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-[#e2dcd6] dark:border-[#333333]">

                    <button mat-raised-button color="primary" class="!rounded-xl !py-2 !px-6 hover:scale-[1.02] active:scale-95 transition-transform duration-300 shadow-lg shadow-[#D4AF37]/20" type="submit" [disabled]="isLoading">
                        {{ isLoading ? 'Guardando...' : 'Guardar Cambios' }}
                    </button>
                
</div>
            </form>
        </mat-card-content>
      </mat-card>
    </div>
