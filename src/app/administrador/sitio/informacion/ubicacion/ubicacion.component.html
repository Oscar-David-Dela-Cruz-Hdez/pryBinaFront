<div class="admin-container w-full max-w-4xl mx-auto p-4 md:p-8 animate-slide-up transition-all duration-300 min-h-[calc(100vh-80px)]">
  <div class="mb-8 border-b border-[#e2dcd6] dark:border-[#333333] pb-4">
    <h2 class="text-3xl font-bold text-[#2C2C2C] dark:text-[#F0F0F0]">Gestión de Ubicación</h2>
  </div>

  <mat-card class="bg-[#FFFFFF] dark:bg-[#1E1E1E] rounded-2xl shadow-md shadow-black/5 dark:shadow-black/40 border border-[#e2dcd6]/30 dark:border-[#333333]/30 animate-fade-in">
    <mat-card-content class="p-6">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Dirección</mat-label>
          <input matInput formControlName="direccion" placeholder="Calle, número, ciudad..."
                 class="bg-[#FAF8F5] dark:bg-[#2A2A2A]">
        </mat-form-field>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Latitud</mat-label>
            <input matInput type="number" formControlName="latitud" class="bg-[#FAF8F5] dark:bg-[#2A2A2A]">
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Longitud</mat-label>
            <input matInput type="number" formControlName="longitud" class="bg-[#FAF8F5] dark:bg-[#2A2A2A]">
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>URL Google Maps (Iframe/Embed)</mat-label>
          <input matInput formControlName="googleMapsUrl" placeholder="https://www.google.com/maps/embed..."
                 class="bg-[#FAF8F5] dark:bg-[#2A2A2A]">
        </mat-form-field>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Teléfono</mat-label>
            <input matInput formControlName="telefono" placeholder="+52..." class="bg-[#FAF8F5] dark:bg-[#2A2A2A]">
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Horario</mat-label>
            <input matInput formControlName="horario" placeholder="Lunes a Viernes 9am - 6pm"
                   class="bg-[#FAF8F5] dark:bg-[#2A2A2A]">
          </mat-form-field>
        </div>

        <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-[#e2dcd6]/30 dark:border-[#333333]/30">
          <button mat-raised-button
            class="!rounded-xl !py-2 !px-6 bg-[#D4AF37] dark:bg-[#E5C158] text-white dark:text-[#0F172A] hover:scale-[1.02] active:scale-95 transition-transform duration-300 shadow-lg shadow-[#D4AF37]/20"
            type="submit" [disabled]="isLoading">
            {{ isLoading ? 'Guardando...' : 'Guardar Cambios' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
