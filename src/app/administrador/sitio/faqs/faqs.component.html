<div class="admin-container w-full max-w-4xl mx-auto p-4 md:p-8 animate-slide-up transition-all duration-300 min-h-[calc(100vh-80px)]">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 border-b border-[#e2dcd6] dark:border-[#333333] pb-4 gap-4">
        <div class="mb-8 border-b border-[#e2dcd6] dark:border-[#333333] pb-4"><h2 class="text-3xl font-bold text-[#2C2C2C] dark:text-[#F0F0F0]">Gestión de Preguntas Frecuentes (FAQs)</h2></div>
        <button mat-raised-button color="primary" class="!rounded-xl !py-2 !px-6 hover:scale-[1.02] active:scale-95 transition-transform duration-300 shadow-lg shadow-[#D4AF37]/20" (click)="toggleForm()">
          <mat-icon>{{ showForm ? 'remove' : 'add' }}</mat-icon>
          {{ showForm ? 'Cancelar' : 'Nueva Pregunta' }}
        </button>
      </div>

      <!-- Formulario Agregar/Editar -->
      <mat-card *ngIf="showForm" class="mb-4 fade-in">
        <mat-card-header>
          <mat-card-title>{{ editingId ? 'Editar FAQ' : 'Agregar Nueva FAQ' }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <form [formGroup]="faqForm" (ngSubmit)="onSubmit()">
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Pregunta</mat-label>
              <input matInput formControlName="pregunta" placeholder="Ej: ¿Cuáles son los métodos de pago?">
            </mat-form-field>

            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Respuesta</mat-label>
              <textarea matInput formControlName="respuesta" rows="3" placeholder="Respuesta detallada..."></textarea>
            </mat-form-field>

            <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-[#e2dcd6] dark:border-[#333333]">

              <button mat-stroked-button class="!rounded-xl !py-2 !px-6 hover:bg-gray-50 dark:hover:bg-[#333333] transition-colors duration-300" type="button" (click)="toggleForm()">Cancelar</button>
              <button mat-raised-button color="primary" class="!rounded-xl !py-2 !px-6 hover:scale-[1.02] active:scale-95 transition-transform duration-300 shadow-lg shadow-[#D4AF37]/20" type="submit" [disabled]="faqForm.invalid || isLoading">
                {{ isLoading ? 'Guardando...' : (editingId ? 'Actualizar' : 'Guardar') }}
              </button>
            
</div>
          </form>
        </mat-card-content>
      </mat-card>

      <!-- Lista de FAQs -->
      <div class="faqs-list" *ngIf="faqs.length > 0; else noFaqs">
        <mat-accordion>
          <mat-expansion-panel *ngFor="let faq of faqs">
            <mat-expansion-panel-header>
              <mat-panel-title>
                {{ faq.pregunta }}
              </mat-panel-title>
            </mat-expansion-panel-header>
            
            <p>{{ faq.respuesta }}</p>

            <mat-action-row>
              <button mat-button color="primary" (click)="editFaq(faq)">
                <mat-icon>edit</mat-icon> Editar
              </button>
              <button mat-button color="warn" (click)="deleteFaq(faq._id)">
                <mat-icon>delete</mat-icon> Eliminar
              </button>
            </mat-action-row>
          </mat-expansion-panel>
        </mat-accordion>
      </div>

      <ng-template #noFaqs>
        <div class="empty-state">
          <mat-icon>quiz</mat-icon>
          <p>No hay preguntas frecuentes registradas.</p>
        </div>
      </ng-template>
    </div>
