<div class="admin-container w-full max-w-4xl mx-auto p-4 md:p-8 animate-slide-up transition-all duration-300 min-h-[calc(100vh-80px)]">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 border-b border-[#e2dcd6] dark:border-[#333333] pb-4 gap-4">
    <div>
      <h2 class="text-3xl font-bold text-[#2C2C2C] dark:text-[#F0F0F0]">Preguntas Frecuentes</h2>
      <p class="text-sm text-[#666666] dark:text-[#A0A0A0] mt-1">{{ faqs.length }} pregunta(s) registrada(s)</p>
    </div>
    <button class="btn-admin-primary" (click)="toggleForm()">
      <mat-icon>{{ showForm ? 'remove' : 'add' }}</mat-icon>
      {{ showForm ? 'Cancelar' : 'Nueva Pregunta' }}
    </button>
  </div>

  <!-- Formulario -->
  <mat-card *ngIf="showForm" class="mb-6 bg-[#FFFFFF] dark:bg-[#1E1E1E] rounded-2xl shadow-md shadow-black/5 dark:shadow-black/40 border border-[#e2dcd6]/30 dark:border-[#333333]/30 animate-fade-in">
    <mat-card-header class="p-6 pb-0">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-[#D4AF37]/10 dark:bg-[#E5C158]/10 flex items-center justify-center">
          <mat-icon class="text-[#D4AF37] dark:text-[#E5C158] !text-xl">{{ editingId ? 'edit_note' : 'quiz' }}</mat-icon>
        </div>
        <mat-card-title class="text-xl font-semibold text-[#2C2C2C] dark:text-[#F0F0F0]">
          {{ editingId ? 'Editar Pregunta' : 'Agregar Nueva Pregunta' }}
        </mat-card-title>
      </div>
    </mat-card-header>
    <mat-card-content class="p-6">
      <form [formGroup]="faqForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div class="field-admin">
          <label class="label-admin">Pregunta <span class="text-red-500">*</span></label>
          <input type="text" formControlName="pregunta" placeholder="Ej: ¿Cuáles son los métodos de pago?" class="input-admin">
        </div>
        <div class="field-admin">
          <label class="label-admin">Respuesta <span class="text-red-500">*</span></label>
          <textarea formControlName="respuesta" rows="4" placeholder="Respuesta detallada..." class="textarea-admin"></textarea>
        </div>
        <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-[#e2dcd6]/30 dark:border-[#333333]/30">
          <button type="button" class="btn-admin-secondary" (click)="toggleForm()">Cancelar</button>
          <button type="submit" class="btn-admin-primary" [disabled]="faqForm.invalid || isLoading">
            {{ isLoading ? 'Guardando...' : (editingId ? 'Actualizar' : 'Guardar') }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <!-- Lista de FAQs en tarjetas -->
  <div class="space-y-3 animate-fade-in" *ngIf="faqs.length > 0; else noFaqs">
    <div *ngFor="let faq of faqs; let i = index"
         class="group bg-[#FFFFFF] dark:bg-[#1E1E1E] rounded-2xl border border-[#e2dcd6]/40 dark:border-[#333333]/40 shadow-sm hover:shadow-md hover:border-[#D4AF37]/30 dark:hover:border-[#E5C158]/30 transition-all duration-300">

      <div class="flex items-start gap-4 p-5">
        <!-- Número -->
        <div class="flex-shrink-0 w-9 h-9 rounded-xl bg-[#D4AF37]/10 dark:bg-[#E5C158]/10 flex items-center justify-center font-bold text-[#D4AF37] dark:text-[#E5C158] text-sm">
          {{ i + 1 }}
        </div>

        <!-- Contenido -->
        <div class="flex-1 min-w-0">
          <p class="font-semibold text-[#2C2C2C] dark:text-[#F0F0F0] leading-snug mb-2">{{ faq.pregunta }}</p>
          <p class="text-sm text-[#666666] dark:text-[#A0A0A0] leading-relaxed line-clamp-2">{{ faq.respuesta }}</p>
        </div>

        <!-- Acciones — visibles al hacer hover -->
        <div class="flex-shrink-0 flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
          <button class="admin-btn-edit" (click)="editFaq(faq)" title="Editar">
            <mat-icon style="font-size:18px;width:18px;height:18px">edit</mat-icon>
          </button>
          <button class="admin-btn-delete" (click)="deleteFaq(faq._id)" title="Eliminar">
            <mat-icon style="font-size:18px;width:18px;height:18px">delete</mat-icon>
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- Estado vacío -->
  <ng-template #noFaqs>
    <div class="flex flex-col items-center justify-center gap-4 py-16 bg-[#FAF8F5]/50 dark:bg-[#2A2A2A]/50 rounded-2xl border-2 border-dashed border-[#e2dcd6] dark:border-[#333333]">
      <div class="w-16 h-16 rounded-2xl bg-[#D4AF37]/10 dark:bg-[#E5C158]/10 flex items-center justify-center">
        <mat-icon class="!text-4xl text-[#D4AF37] dark:text-[#E5C158]">quiz</mat-icon>
      </div>
      <div class="text-center">
        <p class="font-semibold text-[#2C2C2C] dark:text-[#F0F0F0]">Sin preguntas aún</p>
        <p class="text-sm text-[#666666] dark:text-[#A0A0A0] mt-1">Agrega tu primera pregunta frecuente</p>
      </div>
      <button class="btn-admin-primary" (click)="toggleForm()">
        <mat-icon>add</mat-icon> Agregar Pregunta
      </button>
    </div>
  </ng-template>

</div>
