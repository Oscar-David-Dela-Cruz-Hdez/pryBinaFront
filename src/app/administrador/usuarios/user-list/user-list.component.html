<div class="admin-container w-full max-w-6xl mx-auto p-4 md:p-6 lg:p-8 animate-fade-in transition-all duration-300 min-h-[calc(100vh-80px)]">
  <div class="mb-8 border-b border-[#e2dcd6] dark:border-[#333333] pb-4">
    <h2 class="text-3xl font-bold text-[#2C2C2C] dark:text-[#F0F0F0]">Gestión de Usuarios</h2>
  </div>

  <!-- Filtro de búsqueda -->
  <div class="field-admin mb-6">
    <input type="text" (keyup)="applyFilter($event)" placeholder="Buscar por nombre, email, etc." #input class="input-admin">
  </div>

  <div class="mat-elevation-z8 rounded-2xl overflow-hidden bg-[#FFFFFF] dark:bg-[#1E1E1E] border border-[#e2dcd6]/30 dark:border-[#333333]/30">
    <table mat-table [dataSource]="dataSource" matSort class="w-full">
      <!-- Nombre -->
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="p-3 text-[#2C2C2C] dark:text-[#F0F0F0]">Nombre</th>
        <td mat-cell *matCellDef="let row" class="p-3">
          <div class="flex flex-col">
            <span class="font-medium text-[#2C2C2C] dark:text-[#F0F0F0]">{{ row.nombre }} {{ row.ap }} {{ row.am }}</span>
          </div>
        </td>
      </ng-container>

      <!-- Email -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="p-3 text-[#2C2C2C] dark:text-[#F0F0F0]">Email</th>
        <td mat-cell *matCellDef="let row" class="p-3">{{ row.email }}</td>
      </ng-container>

      <!-- Rol -->
      <ng-container matColumnDef="rol">
        <th mat-header-cell *matHeaderCellDef class="p-3">Admin</th>
        <td mat-cell *matCellDef="let row" class="p-3">
          <button
            class="admin-role-toggle"
            [class.is-admin]="row.rol === 'admin'"
            (click)="toggleRole(row, {checked: row.rol !== 'admin'})"
            [title]="row.rol === 'admin' ? 'Revocar permisos admin' : 'Asignar rol admin'">
            <mat-icon style="font-size:20px;width:20px;height:20px;line-height:20px">
              {{ row.rol === 'admin' ? 'verified_user' : 'person_outline' }}
            </mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- Acciones -->
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="p-3">Acciones</th>
        <td mat-cell *matCellDef="let row" class="p-3">
          <button class="admin-btn-delete" (click)="deleteUser(row)" title="Eliminar usuario">
            <mat-icon style="font-size:18px;width:18px;height:18px">delete</mat-icon>
          </button>
        </td>
      </ng-container>


      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true" class="bg-[#FAF8F5]/80 dark:bg-[#1E1E1E]/80 backdrop-blur-sm"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-[#FAF8F5]/30 dark:hover:bg-[#2A2A2A]/30 transition-colors duration-200"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell p-3 text-center" colspan="4">No hay datos que coincidan con el filtro "{{input.value}}"</td>
      </tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of users" class="bg-[#FAF8F5] dark:bg-[#1E1E1E]"></mat-paginator>
  </div>
</div>
