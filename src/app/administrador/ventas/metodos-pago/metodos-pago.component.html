<div class="admin-container w-full max-w-6xl mx-auto p-4 md:p-6 lg:p-8 animate-fade-in transition-all duration-300 min-h-[calc(100vh-80px)]">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 border-b border-[#e2dcd6] dark:border-[#333333] pb-4 gap-4">
    <h2 class="text-3xl font-bold text-[#2C2C2C] dark:text-[#F0F0F0]">Métodos de Pago</h2>
    <button class="btn-admin-primary" (click)="toggleForm()">
      <mat-icon>{{ showForm ? 'remove' : 'add' }}</mat-icon>
      {{ showForm ? 'Cancelar' : 'Nuevo Método' }}
    </button>
  </div>

  <!-- Formulario -->
  <mat-card *ngIf="showForm" class="mb-6 bg-[#FFFFFF] dark:bg-[#1E1E1E] rounded-2xl shadow-md shadow-black/5 dark:shadow-black/40 border border-[#e2dcd6]/30 dark:border-[#333333]/30 animate-fade-in">
    <mat-card-header class="p-6 pb-0">
      <mat-card-title class="text-xl font-semibold text-[#2C2C2C] dark:text-[#F0F0F0]">
        {{ isEditing ? 'Editar Método' : 'Agregar Método' }}
      </mat-card-title>
    </mat-card-header>
    <mat-card-content class="p-6">
      <form [formGroup]="paymentForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <div class="field-admin">
          <label class="label-admin">Nombre</label>
          <input type="text" formControlName="nombre" placeholder="Ej: Tarjeta de Crédito" class="input-admin">
        </div>

        <div class="field-admin">
          <label class="label-admin">Descripción</label>
          <input type="text" formControlName="descripcion" placeholder="Ej: Pago seguro con tarjeta" class="input-admin">
        </div>

        <div class="field-admin">
          <label class="label-admin">Instrucciones (Opcional)</label>
          <textarea formControlName="instrucciones" rows="3" placeholder="Ej: Clabe interbancaria..." class="textarea-admin"></textarea>
        </div>

        <div class="field-admin">
          <label class="label-admin">Ícono</label>
          <app-icon-picker
            iconSet="payment"
            [value]="paymentForm.get('icono')?.value || ''"
            (iconSelected)="onIconSelected($event)">
          </app-icon-picker>
        </div>

        <div class="mb-2">
          <mat-slide-toggle formControlName="activo" color="primary">Activo</mat-slide-toggle>
        </div>

        <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-[#e2dcd6]/30 dark:border-[#333333]/30">
          <button type="button" class="btn-admin-secondary" (click)="toggleForm()">Cancelar</button>
          <button type="submit" class="btn-admin-primary" [disabled]="paymentForm.invalid || isLoading">
            {{ isLoading ? 'Guardando...' : (isEditing ? 'Actualizar' : 'Guardar') }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>


  <!-- Tabla de métodos de pago -->
  <div class="admin-data-table animate-fade-in" *ngIf="metodos.length > 0; else noData">
    <table>
      <thead>
        <tr class="admin-table-head">
          <th class="admin-th" style="width:48px">Icono</th>
          <th class="admin-th">Nombre</th>
          <th class="admin-th">Descripción</th>
          <th class="admin-th text-center">Estado</th>
          <th class="admin-th text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let metodo of metodos" class="admin-table-row">
          <td class="admin-td">
            <div class="admin-thumb-placeholder">
              <mat-icon *ngIf="!metodo.icono?.includes('http')" style="font-size:18px;width:18px;height:18px">
                {{ metodo.icono || 'payments' }}
              </mat-icon>
            </div>
          </td>
          <td class="admin-td">
            <span class="font-medium">{{ metodo.nombre }}</span>
          </td>
          <td class="admin-td">
            <span class="subtext">{{ metodo.descripcion || '—' }}</span>
          </td>
          <td class="admin-td text-center">
            <span class="badge-admin" [class.badge-active]="metodo.activo" [class.badge-inactive]="!metodo.activo">
              {{ metodo.activo ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
          <td class="admin-td text-right">
            <button class="admin-btn-edit" (click)="editMethod(metodo)" title="Editar">
              <mat-icon style="font-size:18px;width:18px;height:18px">edit</mat-icon>
            </button>
            <button class="admin-btn-delete" (click)="deleteMethod(metodo)" title="Eliminar">
              <mat-icon style="font-size:18px;width:18px;height:18px">delete</mat-icon>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <ng-template #noData>
    <div class="admin-empty-state">
      <mat-icon>payments</mat-icon>
      <p>No hay métodos de pago registrados.</p>
    </div>
  </ng-template>
</div>
