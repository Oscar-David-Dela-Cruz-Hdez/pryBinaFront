<div class="admin-container w-full max-w-6xl mx-auto p-4 md:p-6 lg:p-8 animate-fade-in transition-all duration-300 min-h-[calc(100vh-80px)]">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 border-b border-[#e2dcd6] dark:border-[#333333] pb-4 gap-4">
        <div class="mb-8 border-b border-[#e2dcd6] dark:border-[#333333] pb-4"><h2 class="text-3xl font-bold text-[#2C2C2C] dark:text-[#F0F0F0]">Gestión de Carrusel</h2></div>
        <button mat-raised-button color="primary" class="!rounded-xl !py-2 !px-6 hover:scale-[1.02] active:scale-95 transition-transform duration-300 shadow-lg shadow-[#D4AF37]/20" (click)="toggleForm()">
          <mat-icon>{{ showForm ? 'remove' : 'add' }}</mat-icon>
          {{ showForm ? 'Cancelar' : 'Nuevo Banner' }}
        </button>
      </div>

      <!-- Formulario -->
      <mat-card *ngIf="showForm" class="mb-4 fade-in">
        <mat-card-header>
          <mat-card-title>{{ isEditing ? 'Editar Banner' : 'Agregar Banner' }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <form [formGroup]="carruselForm" (ngSubmit)="onSubmit()">
            
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Título (Opcional)</mat-label>
              <input matInput formControlName="titulo">
            </mat-form-field>

            <mat-form-field appearance="outline" class="full-width">
              <mat-label>URL de Imagen</mat-label>
              <input matInput formControlName="imagenUrl" placeholder="https://example.com/banner.jpg">
            </mat-form-field>

            <img *ngIf="carruselForm.get('imagenUrl')?.value" [src]="carruselForm.get('imagenUrl')?.value" class="preview-img mb-2" alt="Vista previa">

            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Enlace de Destino (Opcional)</mat-label>
              <input matInput formControlName="enlaceDestino">
            </mat-form-field>

            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Orden (Prioridad)</mat-label>
              <input matInput type="number" formControlName="orden">
            </mat-form-field>

            <div class="mb-2">
              <mat-slide-toggle formControlName="activo" color="primary">Activo</mat-slide-toggle>
            </div>

            <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-[#e2dcd6] dark:border-[#333333]">

              <button mat-stroked-button class="!rounded-xl !py-2 !px-6 hover:bg-gray-50 dark:hover:bg-[#333333] transition-colors duration-300" type="button" (click)="toggleForm()">Cancelar</button>
              <button mat-raised-button color="primary" class="!rounded-xl !py-2 !px-6 hover:scale-[1.02] active:scale-95 transition-transform duration-300 shadow-lg shadow-[#D4AF37]/20" type="submit" [disabled]="carruselForm.invalid || isLoading">
                {{ isLoading ? 'Guardando...' : (isEditing ? 'Actualizar' : 'Guardar') }}
              </button>
            
</div>
          </form>
        </mat-card-content>
      </mat-card>

      <!-- Lista -->
      <div class="offers-grid" *ngIf="carruseles.length > 0; else noData">
        <mat-card *ngFor="let item of carruseles" class="offer-card">
          <img mat-card-image [src]="item.imagenUrl" alt="Banner Carrusel">
          <mat-card-content>
            <h3>{{ item.titulo || 'Sin Título' }}</h3>
            <p>Orden: {{ item.orden }}</p>
            <span *ngIf="!item.activo" class="badge-inactive">Inactivo</span>
            <a *ngIf="item.enlaceDestino" [href]="item.enlaceDestino" target="_blank" class="link-dest">Ver destino</a>
          </mat-card-content>
          <mat-card-actions align="end">
            <button mat-icon-button color="primary" (click)="editBanner(item)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteBanner(item)">
              <mat-icon>delete</mat-icon>
            </button>
          </mat-card-actions>
        </mat-card>
      </div>

      <ng-template #noData>
        <div class="empty-state">
          <mat-icon>view_carousel</mat-icon>
          <p>No hay banners registrados.</p>
        </div>
      </ng-template>
    </div>
