<div class="admin-container w-full max-w-6xl mx-auto p-4 md:p-6 lg:p-8 animate-fade-in transition-all duration-300 min-h-[calc(100vh-80px)]">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 border-b border-[#e2dcd6] dark:border-[#333333] pb-4 gap-4">
    <h2 class="text-3xl font-bold text-[#2C2C2C] dark:text-[#F0F0F0]">Gestión de Carrusel</h2>
    <button class="btn-admin-primary" (click)="toggleForm()">
      <mat-icon>{{ showForm ? 'remove' : 'add' }}</mat-icon>
      {{ showForm ? 'Cancelar' : 'Nuevo Banner' }}
    </button>
  </div>

  <!-- Formulario -->
  <mat-card *ngIf="showForm" class="mb-6 bg-[#FFFFFF] dark:bg-[#1E1E1E] rounded-2xl shadow-md shadow-black/5 dark:shadow-black/40 border border-[#e2dcd6]/30 dark:border-[#333333]/30 animate-fade-in">
    <mat-card-header class="p-6 pb-0">
      <mat-card-title class="text-xl font-semibold text-[#2C2C2C] dark:text-[#F0F0F0]">
        {{ isEditing ? 'Editar Banner' : 'Agregar Banner' }}
      </mat-card-title>
    </mat-card-header>
    <mat-card-content class="p-6">
      <form [formGroup]="carruselForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <div class="field-admin">
          <label class="label-admin">Título (Opcional)</label>
          <input type="text" formControlName="titulo" class="input-admin" placeholder="Ej: Promoción de verano">
        </div>

        <div class="field-admin">
          <label class="label-admin">URL de Imagen</label>
          <input type="url" formControlName="imagenUrl" placeholder="https://example.com/banner.jpg" class="input-admin">
        </div>

        <img *ngIf="carruselForm.get('imagenUrl')?.value" [src]="carruselForm.get('imagenUrl')?.value"
             class="preview-img rounded-xl shadow-md max-h-48 object-cover" alt="Vista previa">

        <div class="field-admin">
          <label class="label-admin">Enlace de Destino (Opcional)</label>
          <input type="text" formControlName="enlaceDestino" class="input-admin" placeholder="https://...">
        </div>

        <div class="field-admin">
          <label class="label-admin">Orden (Prioridad)</label>
          <input type="number" formControlName="orden" class="input-admin" placeholder="1">
        </div>

        <div class="mb-2">
          <mat-slide-toggle formControlName="activo" color="primary">Activo</mat-slide-toggle>
        </div>

        <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-[#e2dcd6]/30 dark:border-[#333333]/30">
          <button type="button" class="btn-admin-secondary" (click)="toggleForm()">Cancelar</button>
          <button type="submit" class="btn-admin-primary" [disabled]="carruselForm.invalid || isLoading">
            {{ isLoading ? 'Guardando...' : (isEditing ? 'Actualizar' : 'Guardar') }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <!-- Lista -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" *ngIf="carruseles.length > 0; else noData">
    <mat-card *ngFor="let item of carruseles" class="bg-[#FFFFFF] dark:bg-[#1E1E1E] rounded-2xl shadow-md shadow-black/5 dark:shadow-black/40 border border-[#e2dcd6]/30 dark:border-[#333333]/30 overflow-hidden hover:shadow-xl transition-all duration-300 hover:-translate-y-1">
      <img mat-card-image [src]="item.imagenUrl" alt="Banner Carrusel" class="h-40 object-cover">
      <mat-card-content class="p-4">
        <h3 class="text-lg font-medium text-[#2C2C2C] dark:text-[#F0F0F0]">{{ item.titulo || 'Sin Título' }}</h3>
        <p class="text-sm text-[#666666] dark:text-[#A0A0A0]">Orden: {{ item.orden }}</p>
        <span *ngIf="!item.activo" class="inline-block px-2 py-1 text-xs font-medium text-[#F44336] bg-[#F44336]/10 rounded-full">Inactivo</span>
        <a *ngIf="item.enlaceDestino" [href]="item.enlaceDestino" target="_blank" class="text-[#D4AF37] dark:text-[#E5C158] text-sm hover:underline">Ver destino</a>
      </mat-card-content>
      <mat-card-actions class="p-4 pt-0">
        <button mat-icon-button class="text-[#D4AF37] dark:text-[#E5C158] hover:scale-110 transition-transform" (click)="editBanner(item)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button class="text-[#F44336] hover:scale-110 transition-transform" (click)="deleteBanner(item)">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  </div>

  <ng-template #noData>
    <div class="empty-state flex flex-col items-center justify-center gap-4 py-12 bg-[#FAF8F5]/50 dark:bg-[#2A2A2A]/50 rounded-2xl">
      <mat-icon class="text-4xl text-[#D4AF37] dark:text-[#E5C158]">view_carousel</mat-icon>
      <p class="text-[#666666] dark:text-[#A0A0A0]">No hay banners registrados.</p>
    </div>
  </ng-template>
</div>
