<div class="admin-container w-full max-w-6xl mx-auto p-4 md:p-6 lg:p-8 animate-fade-in transition-all duration-300 min-h-[calc(100vh-80px)]">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 border-b border-[#e2dcd6] dark:border-[#333333] pb-4 gap-4">
    <h2 class="text-3xl font-bold text-[#2C2C2C] dark:text-[#F0F0F0]">Gestión de Familias</h2>
    <button class="btn-admin-primary" (click)="toggleForm()">
      <mat-icon>{{ showForm ? 'remove' : 'add' }}</mat-icon>
      {{ showForm ? 'Cancelar' : 'Nueva Familia' }}
    </button>
  </div>

  <!-- Formulario -->
  <mat-card *ngIf="showForm" class="mb-6 bg-[#FFFFFF] dark:bg-[#1E1E1E] rounded-2xl shadow-md shadow-black/5 dark:shadow-black/40 border border-[#e2dcd6]/30 dark:border-[#333333]/30 animate-fade-in">
    <mat-card-header class="p-6 pb-0">
      <mat-card-title class="text-xl font-semibold text-[#2C2C2C] dark:text-[#F0F0F0]">
        {{ isEditing ? 'Editar Familia' : 'Agregar Familia' }}
      </mat-card-title>
    </mat-card-header>
    <mat-card-content class="p-6">
      <form [formGroup]="familiaForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="field-admin">
            <label class="label-admin">Nombre <span class="text-red-500">*</span></label>
            <input type="text" formControlName="nombre" placeholder="Ej: Tintes Alfaparf" class="input-admin">
            <p *ngIf="familiaForm.get('nombre')?.hasError('required') && familiaForm.get('nombre')?.touched" class="field-error">El nombre es requerido</p>
          </div>
          
          <div class="field-admin">
            <label class="label-admin">Marca <span class="text-red-500">*</span></label>
            <select formControlName="marca" class="select-admin">
              <option value="">Seleccione una marca</option>
              <option *ngFor="let m of marcas" [value]="m._id || m.nombre">{{ m.nombre }}</option>
            </select>
            <p *ngIf="familiaForm.get('marca')?.hasError('required') && familiaForm.get('marca')?.touched" class="field-error">La marca es requerida</p>
          </div>
        </div>

        <div class="field-admin">
          <label class="label-admin">Descripción</label>
          <textarea formControlName="descripcion" rows="3" placeholder="Descripción de la familia..." class="textarea-admin"></textarea>
        </div>

        <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-[#e2dcd6]/30 dark:border-[#333333]/30">
          <button type="button" class="btn-admin-secondary" (click)="toggleForm()">Cancelar</button>
          <button type="submit" class="btn-admin-primary" [disabled]="familiaForm.invalid || isLoading">
            {{ isLoading ? 'Guardando...' : (isEditing ? 'Actualizar' : 'Guardar') }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <!-- Tabla de Familias -->
  <div class="admin-data-table animate-fade-in" *ngIf="familias.length > 0; else noData">
    <table>
      <thead>
        <tr class="admin-table-head">
          <th class="admin-th" style="width:48px"></th>
          <th class="admin-th">Nombre</th>
          <th class="admin-th">Marca Perteneciente</th>
          <th class="admin-th">Descripción</th>
          <th class="admin-th text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let f of familias" class="admin-table-row">
          <td class="admin-td">
            <div class="admin-thumb-placeholder">
              <mat-icon style="font-size:18px;width:18px;height:18px">account_tree</mat-icon>
            </div>
          </td>
          <td class="admin-td">
            <span class="font-medium">{{ f.nombre }}</span>
          </td>
          <td class="admin-td">
            <span class="px-3 py-1 bg-[#FAF8F5] dark:bg-[#333333] text-xs font-semibold rounded-full border border-[#e2dcd6]/50 dark:border-[#444444] text-[#D4AF37] dark:text-[#E5C158]">{{ getMarcaName(f.marca) }}</span>
          </td>
          <td class="admin-td">
            <span class="subtext">{{ f.descripcion || '—' }}</span>
          </td>
          <td class="admin-td text-right">
            <button class="admin-btn-edit" (click)="editFamilia(f)" title="Editar">
              <mat-icon style="font-size:18px;width:18px;height:18px">edit</mat-icon>
            </button>
            <button class="admin-btn-delete" (click)="deleteFamilia(f)" title="Eliminar">
              <mat-icon style="font-size:18px;width:18px;height:18px">delete</mat-icon>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <ng-template #noData>
    <div class="admin-empty-state">
      <mat-icon>account_tree</mat-icon>
      <p>No hay familias registradas.</p>
    </div>
  </ng-template>
</div>
