<header class="bg-[#4A2E83] dark:bg-[#1E293B] shadow-lg border-b border-purple-900/20 dark:border-[#334155] transition-colors duration-300 sticky top-0 z-50">
  <div class="max-w-screen-2xl mx-auto px-4 h-16 flex items-center justify-between gap-3">

    <!-- Logo -->
    <a routerLink="/admin/dashboard" class="flex-shrink-0">
      <img src="assets/images/Panamericana.png" alt="Admin Dashboard" class="h-9 w-auto object-contain">
    </a>

    <!-- Nav -->
    <nav class="hidden xl:flex items-center gap-0.5 flex-1 justify-center">

      <!-- 1. VENTAS Y MARKETING -->
      <button [matMenuTriggerFor]="ventasMenu"
        class="flex items-center gap-1.5 px-3 py-2 text-white/75 hover:text-white hover:bg-white/10 rounded-lg text-sm font-medium transition-colors duration-200 cursor-pointer">
        <mat-icon class="!text-[18px] !w-[18px] !h-[18px] leading-none">point_of_sale</mat-icon>
        Ventas
      </button>
      <mat-menu #ventasMenu="matMenu">
        <button mat-menu-item routerLink="/admin/ventas/reportes">
          <mat-icon>bar_chart</mat-icon> Reportes y Estadísticas
        </button>
        <button mat-menu-item routerLink="/admin/ventas/metodos-pago">
          <mat-icon>payments</mat-icon> Métodos de Pago (CRUD)
        </button>
        <button mat-menu-item routerLink="/admin/ventas/ofertas">
          <mat-icon>local_offer</mat-icon> Ofertas (CRUD)
        </button>
        <button mat-menu-item routerLink="/admin/ventas/carrusel">
          <mat-icon>view_carousel</mat-icon> Carrusel (Banners)
        </button>
      </mat-menu>

      <!-- 2. INVENTARIO -->
      <button [matMenuTriggerFor]="inventarioMenu"
        class="flex items-center gap-1.5 px-3 py-2 text-white/75 hover:text-white hover:bg-white/10 rounded-lg text-sm font-medium transition-colors duration-200 cursor-pointer">
        <mat-icon class="!text-[18px] !w-[18px] !h-[18px] leading-none">inventory_2</mat-icon>
        Inventario
      </button>
      <mat-menu #inventarioMenu="matMenu">
        <button mat-menu-item routerLink="/admin/inventario/productos">
          <mat-icon>category</mat-icon> Productos (CRUD)
        </button>
        <button mat-menu-item routerLink="/admin/inventario/categorias">
          <mat-icon>class</mat-icon> Categorías (CRUD)
        </button>
        <button mat-menu-item routerLink="/admin/inventario/stock">
          <mat-icon>warning</mat-icon> Alertas de Stock
        </button>
      </mat-menu>

      <!-- 3. PEDIDOS Y LOGÍSTICA -->
      <button [matMenuTriggerFor]="pedidosMenu"
        class="flex items-center gap-1.5 px-3 py-2 text-white/75 hover:text-white hover:bg-white/10 rounded-lg text-sm font-medium transition-colors duration-200 cursor-pointer">
        <mat-icon class="!text-[18px] !w-[18px] !h-[18px] leading-none">local_shipping</mat-icon>
        Logística
      </button>
      <mat-menu #pedidosMenu="matMenu">
        <button mat-menu-item routerLink="/admin/pedidos/listado">
          <mat-icon>list_alt</mat-icon> Gestionar Pedidos
        </button>
        <button mat-menu-item routerLink="/admin/pedidos/metodos-envio">
          <mat-icon>flight_takeoff</mat-icon> Paquetería / Envíos (CRUD)
        </button>
      </mat-menu>

      <!-- 4. USUARIOS -->
      <button [matMenuTriggerFor]="usuariosMenu"
        class="flex items-center gap-1.5 px-3 py-2 text-white/75 hover:text-white hover:bg-white/10 rounded-lg text-sm font-medium transition-colors duration-200 cursor-pointer">
        <mat-icon class="!text-[18px] !w-[18px] !h-[18px] leading-none">group</mat-icon>
        Usuarios
      </button>
      <mat-menu #usuariosMenu="matMenu">
        <button mat-menu-item routerLink="/admin/usuarios">
          <mat-icon>manage_accounts</mat-icon> Gestión de Usuarios (CRUD)
        </button>
      </mat-menu>

      <!-- 5. HERRAMIENTAS Y REPORTES -->
      <button [matMenuTriggerFor]="herramientasMenu"
        class="flex items-center gap-1.5 px-3 py-2 text-white/75 hover:text-white hover:bg-white/10 rounded-lg text-sm font-medium transition-colors duration-200 cursor-pointer">
        <mat-icon class="!text-[18px] !w-[18px] !h-[18px] leading-none">build</mat-icon>
        Administración
      </button>
      <mat-menu #herramientasMenu="matMenu">
        <button mat-menu-item routerLink="/admin/herramientas">
          <mat-icon>import_export</mat-icon> Importar/Exportar Datos
        </button>
        <button mat-menu-item routerLink="/admin/herramientas/respaldos">
          <mat-icon>backup</mat-icon> Respaldar Base de Datos
        </button>
      </mat-menu>

      <!-- 6. GESTIÓN DEL SITIO (CMS) -->
      <button [matMenuTriggerFor]="webMenu"
        class="flex items-center gap-1.5 px-3 py-2 text-white/75 hover:text-white hover:bg-white/10 rounded-lg text-sm font-medium transition-colors duration-200 cursor-pointer">
        <mat-icon class="!text-[18px] !w-[18px] !h-[18px] leading-none">web</mat-icon>
        Sitio Web
      </button>
      <mat-menu #webMenu="matMenu">
        <button mat-menu-item routerLink="/admin/sitio/mision"><mat-icon>flag</mat-icon> Misión</button>
        <button mat-menu-item routerLink="/admin/sitio/historia"><mat-icon>history_edu</mat-icon> Historia</button>
        <button mat-menu-item routerLink="/admin/sitio/vision"><mat-icon>visibility</mat-icon> Visión</button>
        <button mat-menu-item routerLink="/admin/sitio/politicas"><mat-icon>policy</mat-icon> Políticas de Privacidad</button>
        <button mat-menu-item routerLink="/admin/sitio/terminos"><mat-icon>gavel</mat-icon> Términos de Servicio</button>
        <button mat-menu-item routerLink="/admin/sitio/ubicacion"><mat-icon>location_on</mat-icon> Ubicación</button>
        <button mat-menu-item routerLink="/admin/sitio/faqs"><mat-icon>quiz</mat-icon> Preguntas Frecuentes</button>
        <button mat-menu-item routerLink="/admin/sitio/contactos"><mat-icon>contact_phone</mat-icon> Contactos y Redes</button>
      </mat-menu>

    </nav>

    <!-- Acciones derecha -->
    <div class="flex items-center gap-1 flex-shrink-0">
      <span class="hidden lg:block text-white/60 text-sm font-medium pr-3 border-r border-white/20">
        Hola, {{ adminName$ | async }}
      </span>

      <button (click)="themeService.toggleTheme()"
        [title]="themeService.isDarkMode() ? 'Cambiar a Modo Claro' : 'Cambiar a Modo Oscuro'"
        class="p-2 rounded-lg text-white/75 hover:text-white hover:bg-white/10 transition-colors duration-200 cursor-pointer">
        <mat-icon class="!text-xl leading-none">{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <button [matMenuTriggerFor]="userMenu"
        class="p-2 rounded-lg text-white/75 hover:text-white hover:bg-white/10 transition-colors duration-200 cursor-pointer">
        <mat-icon class="!text-xl leading-none">account_circle</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <button mat-menu-item routerLink="/perfil">
          <mat-icon>person</mat-icon>
          <span>Mi Perfil</span>
        </button>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Cerrar Sesión</span>
        </button>
      </mat-menu>
    </div>

  </div>
</header>
