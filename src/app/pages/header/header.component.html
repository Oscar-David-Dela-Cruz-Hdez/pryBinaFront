<header class="bg-white dark:bg-[#1E293B] shadow-sm dark:border-b dark:border-[#334155] sticky top-0 z-50 transition-colors duration-300">
  <div class="max-w-screen-xl mx-auto px-6 h-16 flex items-center justify-between gap-4">

    <!-- Logo -->
    <a routerLink="/" class="flex-shrink-0">
      <img src="assets/images/Panamericana.png" alt="Distribuidora Panamericana" class="h-10 w-auto object-contain">
    </a>

    <!-- Nav Links -->
    <nav class="hidden md:flex items-center gap-0.5">
      <a routerLink="/productos"
        class="px-3 py-2 text-sm font-medium text-[#1E293B] dark:text-[#F8FAFC] hover:text-[#4A2E83] dark:hover:text-[#A78BFA] rounded-lg hover:bg-[#4A2E83]/5 dark:hover:bg-[#A78BFA]/10 transition-colors duration-200">
        Productos
      </a>
      <a routerLink="/cabello"
        class="px-3 py-2 text-sm font-medium text-[#1E293B] dark:text-[#F8FAFC] hover:text-[#4A2E83] dark:hover:text-[#A78BFA] rounded-lg hover:bg-[#4A2E83]/5 dark:hover:bg-[#A78BFA]/10 transition-colors duration-200">
        Cabello
      </a>
      <a routerLink="/cosmeticos"
        class="px-3 py-2 text-sm font-medium text-[#1E293B] dark:text-[#F8FAFC] hover:text-[#4A2E83] dark:hover:text-[#A78BFA] rounded-lg hover:bg-[#4A2E83]/5 dark:hover:bg-[#A78BFA]/10 transition-colors duration-200">
        Cosméticos
      </a>
      <a routerLink="/ofertas"
        class="px-3 py-2 text-sm font-medium text-[#1E293B] dark:text-[#F8FAFC] hover:text-[#4A2E83] dark:hover:text-[#A78BFA] rounded-lg hover:bg-[#4A2E83]/5 dark:hover:bg-[#A78BFA]/10 transition-colors duration-200">
        Ofertas
      </a>
      <a routerLink="/ubicacion"
        class="px-3 py-2 text-sm font-medium text-[#1E293B] dark:text-[#F8FAFC] hover:text-[#4A2E83] dark:hover:text-[#A78BFA] rounded-lg hover:bg-[#4A2E83]/5 dark:hover:bg-[#A78BFA]/10 transition-colors duration-200">
        Ubicación
      </a>
      <a routerLink="/contacto"
        class="px-3 py-2 text-sm font-medium text-[#1E293B] dark:text-[#F8FAFC] hover:text-[#4A2E83] dark:hover:text-[#A78BFA] rounded-lg hover:bg-[#4A2E83]/5 dark:hover:bg-[#A78BFA]/10 transition-colors duration-200">
        Contacto
      </a>
    </nav>

    <!-- Acciones -->
    <div class="flex items-center gap-1.5">

      <!-- Buscador -->
      <div class="hidden sm:flex items-center bg-[#F8F9FA] dark:bg-[#0F172A] border border-gray-200 dark:border-[#334155] rounded-xl px-3 py-1.5 gap-2 transition-colors duration-300">
        <input type="text" placeholder="Buscar productos..."
          [(ngModel)]="searchQuery" (keyup.enter)="onSearch()"
          class="bg-transparent text-sm text-[#1E293B] dark:text-[#F8FAFC] placeholder-gray-400 dark:placeholder-slate-500 outline-none w-36 transition-colors duration-300">
        <button (click)="onSearch()"
          class="text-gray-400 dark:text-slate-400 hover:text-[#4A2E83] dark:hover:text-[#A78BFA] transition-colors duration-200 cursor-pointer">
          <mat-icon class="!text-[18px] !w-[18px] !h-[18px] leading-none">search</mat-icon>
        </button>
      </div>

      <!-- Dark Mode Toggle -->
      <button (click)="themeService.toggleTheme()"
        [title]="themeService.isDarkMode() ? 'Modo Claro' : 'Modo Oscuro'"
        class="p-2 rounded-lg text-slate-500 dark:text-slate-400 hover:text-[#4A2E83] dark:hover:text-[#A78BFA] hover:bg-[#4A2E83]/5 dark:hover:bg-[#A78BFA]/10 transition-colors duration-200 cursor-pointer">
        <mat-icon class="!text-xl leading-none">{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <!-- Carrito -->
      <a mat-button routerLink="/carrito"
        class="flex items-center gap-1.5 px-3 py-2 text-sm font-medium text-[#1E293B] dark:text-[#F8FAFC] hover:text-[#4A2E83] dark:hover:text-[#A78BFA] hover:bg-[#4A2E83]/5 dark:hover:bg-[#A78BFA]/10 rounded-xl transition-colors duration-200">
        <mat-icon [matBadge]="cartCount > 0 ? cartCount : null" matBadgeColor="warn" class="!text-xl leading-none">shopping_cart</mat-icon>
        <span class="hidden lg:block">Carrito</span>
      </a>

      <!-- Usuario -->
      <button [matMenuTriggerFor]="userMenu"
        class="p-2 rounded-lg text-slate-500 dark:text-slate-400 hover:text-[#4A2E83] dark:hover:text-[#A78BFA] hover:bg-[#4A2E83]/5 dark:hover:bg-[#A78BFA]/10 transition-colors duration-200 cursor-pointer">
        <mat-icon class="!text-xl leading-none">person_outline</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <a mat-menu-item routerLink="/login">
          <mat-icon>login</mat-icon>
          <span>Iniciar Sesión</span>
        </a>
        <a mat-menu-item routerLink="/register">
          <mat-icon>person_add</mat-icon>
          <span>Registrarse</span>
        </a>
        <a mat-menu-item routerLink="/password-recovery">
          <mat-icon>lock_reset</mat-icon>
          <span>Recuperar Contraseña</span>
        </a>
      </mat-menu>

    </div>
  </div>
</header>
