<!-- Top bar dinamica de contactos -->
<div *ngIf="topContacts.length > 0" class="bg-[#D4AF37] dark:bg-[#CFAA43] text-[#1E1E1E] text-[11px] font-bold py-1.5 px-6 flex justify-between items-center transition-all animate-fade-in shadow-inner border-b border-black/10">
  <div class="max-w-screen-xl mx-auto w-full flex justify-end gap-6 overflow-hidden">
    <div *ngFor="let c of topContacts" class="flex items-center gap-1.5 opacity-80 hover:opacity-100 transition-opacity cursor-pointer">
      <mat-icon class="!text-[14px] !w-[14px] !h-[14px] leading-tight">{{ c.icono || getContactIcon(c.tipo) }}</mat-icon>
      <span class="tracking-wide">{{ c.valor }}</span>
    </div>
  </div>
</div>

<header class="bg-[#FFFFFF] dark:bg-[#1E1E1E] shadow-sm dark:border-b dark:border-[#333333]/30 sticky top-0 z-50 transition-all duration-300">
  <div class="max-w-screen-xl mx-auto px-6 h-16 flex items-center justify-between gap-4">
    <!-- Logo -->
    <a routerLink="/" class="flex-shrink-0">
      <img src="assets/images/Panamericana.png" alt="Distribuidora Panamericana" class="h-10 w-auto object-contain">
    </a>

    <!-- Nav Links Dinámicos -->
    <nav class="hidden lg:flex items-center gap-1">
      <!-- Botón Explorar con Dropdown -->
      <button [matMenuTriggerFor]="exploreMenu" 
        class="group flex items-center gap-2 px-4 py-2 text-sm font-bold text-[#2C2C2C] dark:text-[#F0F0F0] hover:text-[#D4AF37] dark:hover:text-[#E5C158] rounded-xl hover:bg-[#D4AF37]/5 dark:hover:bg-[#E5C158]/10 transition-all duration-300">
        <mat-icon class="!text-[20px] transition-transform group-hover:rotate-180">expand_more</mat-icon>
        <span>EXPLORAR</span>
      </button>

      <mat-menu #exploreMenu="matMenu" class="!bg-[#FFFFFF] dark:!bg-[#1E1E1E] !rounded-2xl !shadow-2xl !border-none !p-2 !min-w-[420px]">
        <div class="grid grid-cols-2 gap-4 p-4 min-w-[400px]">
          <!-- Columna Familias -->
          <div class="space-y-3">
            <h4 class="text-[10px] font-black uppercase tracking-widest text-[#D4AF37] mb-2 px-3">Categorías</h4>
            <div class="flex flex-col gap-1">
              <a *ngFor="let fam of familias" mat-menu-item 
                [routerLink]="['/productos']" [queryParams]="{ familia: fam._id }"
                class="!h-9 !py-0 !px-3 !rounded-lg !text-sm text-[#2C2C2C] dark:text-[#F0F0F0] hover:!bg-[#D4AF37]/5">
                {{ fam.nombre }}
              </a>
            </div>
          </div>

          <!-- Columna Marcas -->
          <div class="space-y-3 border-l border-[#e2dcd6]/30 dark:border-[#333333]/30 pl-4">
            <h4 class="text-[10px] font-black uppercase tracking-widest text-[#D4AF37] mb-2 px-3">Marcas Destacadas</h4>
            <div class="flex flex-col gap-1">
              <a *ngFor="let marca of marcas" mat-menu-item 
                [routerLink]="['/productos']" [queryParams]="{ marca: marca._id }"
                class="!h-9 !py-0 !px-3 !rounded-lg !text-sm text-[#2C2C2C] dark:text-[#F0F0F0] hover:!bg-[#D4AF37]/5">
                {{ marca.nombre }}
              </a>
            </div>
          </div>
        </div>
      </mat-menu>

      <!-- Botón Nosotros con Dropdown (Dinámico hacia footer info conceptualmente) -->
      <button [matMenuTriggerFor]="nosotrosMenu" 
        class="group flex items-center gap-2 px-4 py-2 text-sm font-bold text-[#2C2C2C] dark:text-[#F0F0F0] hover:text-[#D4AF37] dark:hover:text-[#E5C158] rounded-xl hover:bg-[#D4AF37]/5 dark:hover:bg-[#E5C158]/10 transition-all duration-300">
        <mat-icon class="!text-[20px] transition-transform group-hover:rotate-180">expand_more</mat-icon>
        <span>NOSOTROS</span>
      </button>

      <mat-menu #nosotrosMenu="matMenu" class="!bg-[#FFFFFF] dark:!bg-[#1E1E1E] !rounded-2xl !shadow-2xl !border-none !p-2">
        <div class="flex flex-col gap-1 p-2">
          <a mat-menu-item routerLink="/historia" class="!rounded-lg hover:!bg-[#D4AF37]/5 !h-9 !text-sm font-semibold">Historia</a>
          <a mat-menu-item routerLink="/mision-vision" class="!rounded-lg hover:!bg-[#D4AF37]/5 !h-9 !text-sm font-semibold">Misión y Visión</a>
        </div>
      </mat-menu>

      <!-- Enlaces Fijos -->
      <a routerLink="/productos"
        class="px-4 py-2 text-sm font-semibold text-[#2C2C2C] dark:text-[#F0F0F0] hover:text-[#D4AF37] dark:hover:text-[#E5C158] rounded-xl hover:bg-[#D4AF37]/5 dark:hover:bg-[#E5C158]/10 transition-all duration-200">
        Productos
      </a>
      <a routerLink="/ubicacion"
        class="px-4 py-2 text-sm font-semibold text-[#2C2C2C] dark:text-[#F0F0F0] hover:text-[#D4AF37] dark:hover:text-[#E5C158] rounded-xl hover:bg-[#D4AF37]/5 dark:hover:bg-[#E5C158]/10 transition-all duration-200">
        Ubicación
      </a>
      <a routerLink="/contacto"
        class="px-4 py-2 text-sm font-semibold text-[#2C2C2C] dark:text-[#F0F0F0] hover:text-[#D4AF37] dark:hover:text-[#E5C158] rounded-xl hover:bg-[#D4AF37]/5 dark:hover:bg-[#E5C158]/10 transition-all duration-200">
        Contacto
      </a>
    </nav>

    <!-- Acciones -->
    <div class="flex items-center gap-1.5">
      <!-- Buscador -->
      <div class="hidden sm:flex items-center bg-[#FAF8F5] dark:bg-[#2A2A2A] border border-[#e2dcd6]/30 dark:border-[#333333]/30 rounded-xl px-3 py-1.5 gap-2 transition-all duration-300">
        <input type="text" placeholder="Buscar productos..."
          [(ngModel)]="searchQuery" (keyup.enter)="onSearch()"
          class="bg-transparent text-sm text-[#2C2C2C] dark:text-[#F0F0F0] placeholder-[#666666] dark:placeholder-[#A0A0A0] outline-none w-36 transition-all duration-300">
        <button (click)="onSearch()"
          class="text-[#666666] dark:text-[#A0A0A0] hover:text-[#D4AF37] dark:hover:text-[#E5C158] transition-all duration-200 cursor-pointer hover:scale-[1.02] hover:-translate-y-1 active:scale-95 ease-out">
          <mat-icon class="!text-[18px] !w-[18px] !h-[18px] leading-none">search</mat-icon>
        </button>
      </div>

      <!-- Dark Mode Toggle -->
      <button (click)="themeService.toggleTheme()"
        [title]="themeService.isDarkMode() ? 'Modo Claro' : 'Modo Oscuro'"
        class="p-2 rounded-lg text-[#666666] dark:text-[#A0A0A0] hover:text-[#D4AF37] dark:hover:text-[#E5C158] hover:bg-[#D4AF37]/5 dark:hover:bg-[#E5C158]/10 transition-all duration-200 cursor-pointer hover:scale-[1.02] hover:-translate-y-1 active:scale-95 ease-out">
        <mat-icon class="!text-xl leading-none">{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <!-- Carrito -->
      <a mat-button routerLink="/carrito"
        class="flex items-center gap-1.5 px-3 py-2 text-sm font-medium text-[#2C2C2C] dark:text-[#F0F0F0] hover:text-[#D4AF37] dark:hover:text-[#E5C158] hover:bg-[#D4AF37]/5 dark:hover:bg-[#E5C158]/10 rounded-xl transition-all duration-200">
        <mat-icon [matBadge]="cartCount > 0 ? cartCount : null" matBadgeColor="warn" class="!text-xl leading-none">shopping_cart</mat-icon>
        <span class="hidden lg:block">Carrito</span>
      </a>

      <!-- Usuario -->
      <button [matMenuTriggerFor]="userMenu"
        class="p-2 rounded-lg text-[#666666] dark:text-[#A0A0A0] hover:text-[#D4AF37] dark:hover:text-[#E5C158] hover:bg-[#D4AF37]/5 dark:hover:bg-[#E5C158]/10 transition-all duration-200 cursor-pointer hover:scale-[1.02] hover:-translate-y-1 active:scale-95 ease-out">
        <mat-icon class="!text-xl leading-none">person_outline</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu" class="!bg-[#FFFFFF] dark:!bg-[#1E1E1E] !rounded-xl !shadow-lg !border !border-[#e2dcd6]/30 dark:!border-[#333333]/30">
        <a mat-menu-item routerLink="/login" class="!text-[#2C2C2C] dark:!text-[#F0F0F0] hover:!bg-[#FAF8F5]/50 dark:hover:!bg-[#2A2A2A]/50 transition-colors">
          <mat-icon class="!text-[#666666] dark:!text-[#A0A0A0]">login</mat-icon>
          <span>Iniciar Sesión</span>
        </a>
        <a mat-menu-item routerLink="/register" class="!text-[#2C2C2C] dark:!text-[#F0F0F0] hover:!bg-[#FAF8F5]/50 dark:hover:!bg-[#2A2A2A]/50 transition-colors">
          <mat-icon class="!text-[#666666] dark:!text-[#A0A0A0]">person_add</mat-icon>
          <span>Registrarse</span>
        </a>
        <a mat-menu-item routerLink="/password-recovery" class="!text-[#2C2C2C] dark:!text-[#F0F0F0] hover:!bg-[#FAF8F5]/50 dark:hover:!bg-[#2A2A2A]/50 transition-colors">
          <mat-icon class="!text-[#666666] dark:!text-[#A0A0A0]">lock_reset</mat-icon>
          <span>Recuperar Contraseña</span>
        </a>
      </mat-menu>
    </div>
  </div>
</header>
