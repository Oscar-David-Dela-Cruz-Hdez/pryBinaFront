<div class="min-h-screen bg-[#F8F9FA] dark:bg-[#0F172A] transition-colors duration-300">
  <div class="max-w-screen-xl mx-auto px-6 py-8">
    <div class="flex flex-col lg:flex-row gap-8">

      <!-- Sidebar / Filtros -->
      <aside class="lg:w-64 flex-shrink-0">
        <div class="bg-white dark:bg-[#1E293B] rounded-2xl shadow-sm dark:border dark:border-[#334155] p-6 sticky top-24 transition-colors duration-300">
          <h3 class="text-base font-semibold text-[#1E293B] dark:text-[#F8FAFC] mb-5 transition-colors duration-300">
            Filtros
          </h3>
          <p class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-3">
            Categoría
          </p>
          <mat-selection-list [multiple]="false" (selectionChange)="onCategoryChange($event)">
            <mat-list-option [value]="null" [selected]="!selectedCategory">
              Todas
            </mat-list-option>
            <mat-list-option *ngFor="let cat of categories" [value]="cat._id"
              [selected]="selectedCategory === cat._id">
              {{ cat.nombre }}
            </mat-list-option>
          </mat-selection-list>
        </div>
      </aside>

      <!-- Grid de Productos -->
      <main class="flex-1">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-2xl font-bold text-[#1E293B] dark:text-[#F8FAFC] transition-colors duration-300">Catálogo</h2>
        </div>

        <!-- Spinner de carga -->
        <div *ngIf="isLoading" class="flex justify-center items-center py-24">
          <mat-spinner diameter="48"></mat-spinner>
        </div>

        <!-- Estado vacío -->
        <div *ngIf="!isLoading && products.length === 0"
          class="bg-white dark:bg-[#1E293B] rounded-2xl shadow-sm dark:border dark:border-[#334155] p-20 text-center transition-colors duration-300">
          <mat-icon class="!text-6xl text-slate-200 dark:text-slate-700 mb-4">search_off</mat-icon>
          <p class="text-slate-500 dark:text-slate-400">No se encontraron productos con los filtros seleccionados.</p>
        </div>

        <!-- Grid de productos -->
        <div *ngIf="!isLoading && products.length > 0" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
          <div *ngFor="let product of products"
            class="group bg-white dark:bg-[#1E293B] rounded-2xl shadow-sm dark:border dark:border-[#334155] overflow-hidden hover:shadow-md dark:hover:border-[#A78BFA]/30 transition-all duration-300">
            <div class="overflow-hidden h-52 bg-gray-50 dark:bg-[#0F172A]">
              <img [src]="product.imagenUrl || 'assets/images/no-image.png'" [alt]="product.nombre"
                class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
            </div>
            <div class="p-5">
              <p class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">
                {{ product.categoria?.nombre || 'Sin Categoría' }}
              </p>
              <h3 class="text-base font-semibold text-[#1E293B] dark:text-[#F8FAFC] mb-4 line-clamp-2 leading-snug transition-colors duration-300">
                {{ product.nombre }}
              </h3>
              <div class="flex items-center justify-between">
                <span class="text-xl font-bold text-[#4A2E83] dark:text-[#A78BFA] transition-colors duration-300">
                  {{ product.precio | currency }}
                </span>
                <button (click)="addToCart(product)"
                  class="flex items-center gap-1.5 px-4 py-2 bg-[#4A2E83] dark:bg-[#A78BFA] text-white dark:text-[#0F172A] rounded-xl text-sm font-semibold hover:opacity-90 transition-all duration-300 cursor-pointer">
                  <mat-icon class="!text-[18px] !w-[18px] !h-[18px]">add_shopping_cart</mat-icon>
                  Agregar
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>

    </div>
  </div>
</div>
