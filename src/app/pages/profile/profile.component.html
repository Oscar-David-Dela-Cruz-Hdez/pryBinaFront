<section class="profile-page">
  <div class="profile-shell">
    <aside class="profile-sidebar">
      <span class="section-kicker">Mi cuenta</span>
      <h1>Perfil</h1>
      <p>Administra tus datos personales, contraseña y pregunta de seguridad.</p>

      <nav class="profile-nav" aria-label="Opciones de perfil">
        <button type="button" (click)="selectSection('userdata')" [class.is-active]="selectedSection === 'userdata'">
          <mat-icon>person</mat-icon>
          <span>Datos personales</span>
        </button>
        <button type="button" (click)="selectSection('password')" [class.is-active]="selectedSection === 'password'">
          <mat-icon>lock</mat-icon>
          <span>Contraseña</span>
        </button>
        <button type="button" (click)="selectSection('pregunta')" [class.is-active]="selectedSection === 'pregunta'">
          <mat-icon>security</mat-icon>
          <span>Pregunta secreta</span>
        </button>
      </nav>
    </aside>

    <div class="profile-content">
      <app-userdata *ngIf="selectedSection === 'userdata'"></app-userdata>
      <app-password *ngIf="selectedSection === 'password'"></app-password>
      <app-pregunta *ngIf="selectedSection === 'pregunta'"></app-pregunta>
    </div>
  </div>
</section>
