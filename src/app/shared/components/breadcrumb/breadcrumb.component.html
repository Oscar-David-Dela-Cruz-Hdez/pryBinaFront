<div class="flex items-center gap-2 text-sm text-[#666666] dark:text-[#A0A0A0] transition-all duration-300">
  <a routerLink="/" class="flex items-center gap-2 hover:text-[#D4AF37] dark:hover:text-[#E5C158] transition-all duration-200">
    <mat-icon class="!text-[16px] !w-[16px] !h-[16px]">home</mat-icon>
    <span>Inicio</span>
  </a>
  <mat-icon class="!text-[14px] !w-[14px] !h-[14px] text-[#666666] dark:text-[#A0A0A0]">chevron_right</mat-icon>
  <ng-container *ngFor="let breadcrumb of breadcrumbs; let last = last">
    <a *ngIf="!last" [routerLink]="breadcrumb.url" class="hover:text-[#D4AF37] dark:hover:text-[#E5C158] transition-all duration-200">
      {{ breadcrumb.label }}
    </a>
    <span *ngIf="last" class="font-medium text-[#2C2C2C] dark:text-[#F0F0F0]">
      {{ breadcrumb.label }}
    </span>
    <mat-icon *ngIf="!last" class="!text-[14px] !w-[14px] !h-[14px] text-[#666666] dark:text-[#A0A0A0]">chevron_right</mat-icon>
  </ng-container>
</div>
