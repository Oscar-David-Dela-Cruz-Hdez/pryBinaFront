<div class="bg-[#FFFFFF] dark:bg-[#1E1E1E] rounded-2xl shadow-sm dark:border dark:border-[#333333] p-8 transition-all duration-300 hover:-translate-y-1 hover:shadow-xl ease-out animate-fade-in">
  <div class="mb-6 pb-6 border-b border-[#e2dcd6] dark:border-[#333333] transition-all duration-300">
    <h2 class="text-xl font-bold text-[#2C2C2C] dark:text-[#F0F0F0] transition-all duration-300">Pregunta Secreta</h2>
    <p class="text-sm text-[#666666] dark:text-[#666666] mt-1">Actualiza tu pregunta y respuesta secreta</p>
  </div>

  <form [formGroup]="secretForm" (ngSubmit)="onSubmit()" class="space-y-5 max-w-md">

    <!-- Pregunta Secreta -->
    <div>
      <label class="block text-sm font-medium text-[#2C2C2C] dark:text-[#F0F0F0] mb-1.5 transition-all duration-300">
        Pregunta Secreta
      </label>
      <select formControlName="preguntaSecreta"
        class="w-full px-4 py-3 bg-[#FAF8F5] dark:bg-[#121212] border border-[#e2dcd6] dark:border-[#333333] rounded-xl text-[#2C2C2C] dark:text-[#F0F0F0] focus:outline-none focus:ring-2 focus:ring-[#D4AF37] dark:focus:ring-[#A78BFA] focus:border-transparent transition-all duration-300">
        <option value="personaje-favorito">¿Cuál es tu personaje favorito?</option>
        <option value="pelicula-favorita">¿Cuál es tu película favorita?</option>
        <option value="mejor-amigo">¿Quién es tu mejor amigo?</option>
        <option value="nombre-mascota">¿Cuál es el nombre de tu mascota?</option>
        <option value="deporte-favorito">¿Cuál es tu deporte favorito?</option>
      </select>
    </div>

    <!-- Respuesta Secreta -->
    <div>
      <label class="block text-sm font-medium text-[#2C2C2C] dark:text-[#F0F0F0] mb-1.5 transition-all duration-300">
        Respuesta Secreta
      </label>
      <input formControlName="respuestaSecreta"
        class="w-full px-4 py-3 bg-[#FAF8F5] dark:bg-[#121212] border border-[#e2dcd6] dark:border-[#333333] rounded-xl text-[#2C2C2C] dark:text-[#F0F0F0] focus:outline-none focus:ring-2 focus:ring-[#D4AF37] dark:focus:ring-[#A78BFA] focus:border-transparent transition-all duration-300">
    </div>

    <div class="pt-2">
      <button type="submit" [disabled]="!secretForm.valid"
        class="px-6 py-3 bg-[#D4AF37] dark:bg-[#E5C158] text-white dark:text-[#0F172A] rounded-xl font-semibold text-sm hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 cursor-pointer hover:scale-[1.02] hover:-translate-y-1 active:scale-95 ease-out">
        Guardar Cambios
      </button>
    </div>
  </form>
</div>
