<div class="account-panel">
  <div class="account-panel__header">
    <span>Recuperación</span>
    <h2>Pregunta secreta</h2>
    <p>Actualiza tu pregunta y respuesta para recuperar el acceso cuando lo necesites.</p>
  </div>

  <form [formGroup]="secretForm" (ngSubmit)="onSubmit()" class="account-form account-form--narrow">
    <div class="field">
      <label>Pregunta secreta</label>
      <select formControlName="preguntaSecreta" class="account-input">
        <option value="personaje-favorito">¿Cuál es tu personaje favorito?</option>
        <option value="pelicula-favorita">¿Cuál es tu película favorita?</option>
        <option value="mejor-amigo">¿Quién es tu mejor amigo?</option>
        <option value="nombre-mascota">¿Cuál es el nombre de tu mascota?</option>
        <option value="deporte-favorito">¿Cuál es tu deporte favorito?</option>
      </select>
    </div>

    <div class="field">
      <label>Respuesta secreta</label>
      <input formControlName="respuestaSecreta" class="account-input">
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="!secretForm.valid" class="account-submit">
        Guardar cambios
      </button>
    </div>
  </form>
</div>
