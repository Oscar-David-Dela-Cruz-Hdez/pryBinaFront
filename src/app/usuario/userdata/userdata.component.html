<div class="bg-white dark:bg-[#1E293B] rounded-2xl shadow-sm dark:border dark:border-[#334155] p-8 transition-colors duration-300">
  <div class="mb-6 pb-6 border-b border-gray-100 dark:border-[#334155] transition-colors duration-300">
    <h2 class="text-xl font-bold text-[#1E293B] dark:text-[#F8FAFC] transition-colors duration-300">Datos Personales</h2>
    <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Actualiza tu información personal</p>
  </div>

  <form [formGroup]="userdataForm" (ngSubmit)="onSubmit()" class="space-y-5">

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
      <!-- Nombre -->
      <div>
        <label class="block text-sm font-medium text-[#1E293B] dark:text-[#F8FAFC] mb-1.5 transition-colors duration-300">Nombre/s</label>
        <div class="relative">
          <input formControlName="nombre"
            class="w-full px-4 py-3 pr-10 bg-[#F8F9FA] dark:bg-[#0F172A] border border-gray-200 dark:border-[#334155] rounded-xl text-[#1E293B] dark:text-[#F8FAFC] focus:outline-none focus:ring-2 focus:ring-[#4A2E83] dark:focus:ring-[#A78BFA] focus:border-transparent transition-colors duration-300">
          <mat-icon class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-500 !text-xl pointer-events-none">person</mat-icon>
        </div>
        <p *ngIf="userdataForm.get('nombre')?.hasError('required') && userdataForm.get('nombre')?.touched" class="mt-1.5 text-xs text-red-500">El nombre es requerido</p>
      </div>

      <!-- Apellido Paterno -->
      <div>
        <label class="block text-sm font-medium text-[#1E293B] dark:text-[#F8FAFC] mb-1.5 transition-colors duration-300">Apellido Paterno</label>
        <input formControlName="ap"
          class="w-full px-4 py-3 bg-[#F8F9FA] dark:bg-[#0F172A] border border-gray-200 dark:border-[#334155] rounded-xl text-[#1E293B] dark:text-[#F8FAFC] focus:outline-none focus:ring-2 focus:ring-[#4A2E83] dark:focus:ring-[#A78BFA] focus:border-transparent transition-colors duration-300">
      </div>

      <!-- Apellido Materno -->
      <div>
        <label class="block text-sm font-medium text-[#1E293B] dark:text-[#F8FAFC] mb-1.5 transition-colors duration-300">Apellido Materno</label>
        <input formControlName="am"
          class="w-full px-4 py-3 bg-[#F8F9FA] dark:bg-[#0F172A] border border-gray-200 dark:border-[#334155] rounded-xl text-[#1E293B] dark:text-[#F8FAFC] focus:outline-none focus:ring-2 focus:ring-[#4A2E83] dark:focus:ring-[#A78BFA] focus:border-transparent transition-colors duration-300">
      </div>

      <!-- Username -->
      <div>
        <label class="block text-sm font-medium text-[#1E293B] dark:text-[#F8FAFC] mb-1.5 transition-colors duration-300">Nombre de Usuario</label>
        <div class="relative">
          <input formControlName="username"
            class="w-full px-4 py-3 pr-10 bg-[#F8F9FA] dark:bg-[#0F172A] border border-gray-200 dark:border-[#334155] rounded-xl text-[#1E293B] dark:text-[#F8FAFC] focus:outline-none focus:ring-2 focus:ring-[#4A2E83] dark:focus:ring-[#A78BFA] focus:border-transparent transition-colors duration-300">
          <mat-icon class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-500 !text-xl pointer-events-none">account_circle</mat-icon>
        </div>
        <p *ngIf="userdataForm.get('username')?.hasError('required') && userdataForm.get('username')?.touched" class="mt-1.5 text-xs text-red-500">El usuario es requerido</p>
      </div>

      <!-- Email (readonly) -->
      <div class="sm:col-span-2">
        <label class="block text-sm font-medium text-[#1E293B] dark:text-[#F8FAFC] mb-1.5 transition-colors duration-300">
          Email <span class="text-xs text-slate-400 font-normal">(No se puede cambiar)</span>
        </label>
        <div class="relative">
          <input formControlName="email" readonly
            class="w-full px-4 py-3 pr-10 bg-gray-100 dark:bg-[#0F172A]/60 border border-gray-200 dark:border-[#334155] rounded-xl text-slate-500 dark:text-slate-400 cursor-not-allowed transition-colors duration-300">
          <mat-icon class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-500 !text-xl pointer-events-none">email</mat-icon>
        </div>
      </div>

      <!-- Teléfono -->
      <div class="sm:col-span-2">
        <label class="block text-sm font-medium text-[#1E293B] dark:text-[#F8FAFC] mb-1.5 transition-colors duration-300">Teléfono</label>
        <div class="relative">
          <input type="tel" formControlName="telefono"
            class="w-full px-4 py-3 pr-10 bg-[#F8F9FA] dark:bg-[#0F172A] border border-gray-200 dark:border-[#334155] rounded-xl text-[#1E293B] dark:text-[#F8FAFC] focus:outline-none focus:ring-2 focus:ring-[#4A2E83] dark:focus:ring-[#A78BFA] focus:border-transparent transition-colors duration-300">
          <mat-icon class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-500 !text-xl pointer-events-none">phone</mat-icon>
        </div>
        <p *ngIf="userdataForm.get('telefono')?.hasError('required') && userdataForm.get('telefono')?.touched" class="mt-1.5 text-xs text-red-500">El teléfono es requerido</p>
      </div>
    </div>

    <div class="pt-2">
      <button type="submit" [disabled]="!userdataForm.valid || !userdataForm.dirty"
        class="px-6 py-3 bg-[#4A2E83] dark:bg-[#A78BFA] text-white dark:text-[#0F172A] rounded-xl font-semibold text-sm hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 cursor-pointer">
        Guardar Cambios
      </button>
    </div>

  </form>
</div>
