<div class="bg-white dark:bg-[#1E293B] rounded-2xl shadow-sm dark:border dark:border-[#334155] p-8 transition-colors duration-300">
  <div class="mb-6 pb-6 border-b border-gray-100 dark:border-[#334155] transition-colors duration-300">
    <h2 class="text-xl font-bold text-[#1E293B] dark:text-[#F8FAFC] transition-colors duration-300">Contraseña</h2>
    <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Actualiza tu contraseña de acceso</p>
  </div>

  <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="space-y-5 max-w-md">

    <!-- Contraseña Actual -->
    <div>
      <label class="block text-sm font-medium text-[#1E293B] dark:text-[#F8FAFC] mb-1.5 transition-colors duration-300">
        Contraseña Actual
      </label>
      <div class="relative">
        <input [type]="showPassword ? 'text' : 'password'" formControlName="currentPassword"
          class="w-full px-4 py-3 pr-12 bg-[#F8F9FA] dark:bg-[#0F172A] border border-gray-200 dark:border-[#334155] rounded-xl text-[#1E293B] dark:text-[#F8FAFC] focus:outline-none focus:ring-2 focus:ring-[#4A2E83] dark:focus:ring-[#A78BFA] focus:border-transparent transition-colors duration-300">
        <button type="button" (click)="togglePasswordVisibility()"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-500 hover:text-[#4A2E83] dark:hover:text-[#A78BFA] transition-colors duration-200 cursor-pointer">
          <mat-icon class="!text-xl">{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
    </div>

    <!-- Nueva Contraseña -->
    <div>
      <label class="block text-sm font-medium text-[#1E293B] dark:text-[#F8FAFC] mb-1.5 transition-colors duration-300">
        Nueva Contraseña
      </label>
      <div class="relative">
        <input [type]="showPassword ? 'text' : 'password'" formControlName="newPassword"
          class="w-full px-4 py-3 pr-12 bg-[#F8F9FA] dark:bg-[#0F172A] border border-gray-200 dark:border-[#334155] rounded-xl text-[#1E293B] dark:text-[#F8FAFC] focus:outline-none focus:ring-2 focus:ring-[#4A2E83] dark:focus:ring-[#A78BFA] focus:border-transparent transition-colors duration-300">
      </div>
      <p *ngIf="passwordForm.get('newPassword')?.hasError('pattern') && passwordForm.get('newPassword')?.touched"
        class="mt-1.5 text-xs text-red-500">
        Debe tener 12+ caracteres, 1 mayúscula, 1 número y 1 símbolo.
      </p>
    </div>

    <!-- Confirmar Contraseña -->
    <div>
      <label class="block text-sm font-medium text-[#1E293B] dark:text-[#F8FAFC] mb-1.5 transition-colors duration-300">
        Confirmar Nueva Contraseña
      </label>
      <div class="relative">
        <input [type]="showPassword ? 'text' : 'password'" formControlName="confirmNewPassword"
          class="w-full px-4 py-3 pr-12 bg-[#F8F9FA] dark:bg-[#0F172A] border border-gray-200 dark:border-[#334155] rounded-xl text-[#1E293B] dark:text-[#F8FAFC] focus:outline-none focus:ring-2 focus:ring-[#4A2E83] dark:focus:ring-[#A78BFA] focus:border-transparent transition-colors duration-300">
      </div>
      <p *ngIf="passwordForm.hasError('passwordsDoNotMatch') && passwordForm.get('confirmNewPassword')?.touched"
        class="mt-1.5 text-xs text-red-500">Las contraseñas no coinciden.</p>
    </div>

    <div class="pt-2">
      <button type="submit" [disabled]="!passwordForm.valid"
        class="px-6 py-3 bg-[#4A2E83] dark:bg-[#A78BFA] text-white dark:text-[#0F172A] rounded-xl font-semibold text-sm hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 cursor-pointer">
        Guardar Cambios
      </button>
    </div>

  </form>
</div>
