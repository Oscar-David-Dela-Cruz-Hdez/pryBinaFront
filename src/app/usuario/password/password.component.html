<div class="bg-[#FFFFFF] dark:bg-[#1E1E1E] rounded-2xl shadow-sm dark:border dark:border-[#333333] p-8 transition-all duration-300 hover:-translate-y-1 hover:shadow-xl ease-out animate-fade-in">
  <div class="mb-6 pb-6 border-b border-[#e2dcd6] dark:border-[#333333] transition-all duration-300">
    <h2 class="text-xl font-bold text-[#2C2C2C] dark:text-[#F0F0F0] transition-all duration-300">Contraseña</h2>
    <p class="text-sm text-[#666666] dark:text-[#666666] mt-1">Actualiza tu contraseña de acceso</p>
  </div>

  <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="space-y-5 max-w-md">

    <!-- Contraseña Actual -->
    <div>
      <label class="block text-sm font-medium text-[#2C2C2C] dark:text-[#F0F0F0] mb-1.5 transition-all duration-300">
        Contraseña Actual
      </label>
      <div class="relative">
        <input [type]="showPassword ? 'text' : 'password'" formControlName="currentPassword"
          class="w-full px-4 py-3 pr-12 bg-[#FAF8F5] dark:bg-[#121212] border border-[#e2dcd6] dark:border-[#333333] rounded-xl text-[#2C2C2C] dark:text-[#F0F0F0] focus:outline-none focus:ring-2 focus:ring-[#D4AF37] dark:focus:ring-[#A78BFA] focus:border-transparent transition-all duration-300">
        <button type="button" (click)="togglePasswordVisibility()"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-[#666666] dark:text-[#666666] hover:text-[#D4AF37] dark:hover:text-[#A78BFA] transition-all duration-200 cursor-pointer hover:scale-[1.02] hover:-translate-y-1 active:scale-95 ease-out">
          <mat-icon class="!text-xl">{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
    </div>

    <!-- Nueva Contraseña -->
    <div>
      <label class="block text-sm font-medium text-[#2C2C2C] dark:text-[#F0F0F0] mb-1.5 transition-all duration-300">
        Nueva Contraseña
      </label>
      <div class="relative">
        <input [type]="showPassword ? 'text' : 'password'" formControlName="newPassword"
          class="w-full px-4 py-3 pr-12 bg-[#FAF8F5] dark:bg-[#121212] border border-[#e2dcd6] dark:border-[#333333] rounded-xl text-[#2C2C2C] dark:text-[#F0F0F0] focus:outline-none focus:ring-2 focus:ring-[#D4AF37] dark:focus:ring-[#A78BFA] focus:border-transparent transition-all duration-300">
      </div>
      <p *ngIf="passwordForm.get('newPassword')?.hasError('pattern') && passwordForm.get('newPassword')?.touched"
        class="mt-1.5 text-xs text-red-500">
        Debe tener 12+ caracteres, 1 mayúscula, 1 número y 1 símbolo.
      </p>
    </div>

    <!-- Confirmar Contraseña -->
    <div>
      <label class="block text-sm font-medium text-[#2C2C2C] dark:text-[#F0F0F0] mb-1.5 transition-all duration-300">
        Confirmar Nueva Contraseña
      </label>
      <div class="relative">
        <input [type]="showPassword ? 'text' : 'password'" formControlName="confirmNewPassword"
          class="w-full px-4 py-3 pr-12 bg-[#FAF8F5] dark:bg-[#121212] border border-[#e2dcd6] dark:border-[#333333] rounded-xl text-[#2C2C2C] dark:text-[#F0F0F0] focus:outline-none focus:ring-2 focus:ring-[#D4AF37] dark:focus:ring-[#A78BFA] focus:border-transparent transition-all duration-300">
      </div>
      <p *ngIf="passwordForm.hasError('passwordsDoNotMatch') && passwordForm.get('confirmNewPassword')?.touched"
        class="mt-1.5 text-xs text-red-500">Las contraseñas no coinciden.</p>
    </div>

    <div class="pt-2">
      <button type="submit" [disabled]="!passwordForm.valid"
        class="px-6 py-3 bg-[#D4AF37] dark:bg-[#E5C158] text-white dark:text-[#0F172A] rounded-xl font-semibold text-sm hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 cursor-pointer hover:scale-[1.02] hover:-translate-y-1 active:scale-95 ease-out">
        Guardar Cambios
      </button>
    </div>

  </form>
</div>
