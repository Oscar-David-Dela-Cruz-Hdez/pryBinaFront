name: Análisis de Seguridad Estático (SAST y SCA)

on:
  push:
    branches:
      - master

jobs:
  analisis-seguridad:
    name: Escaneo de Código y Dependencias
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Ejecutar SonarQube Scanner (Análisis de Código)
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Ejecutar Snyk (Análisis de Dependencias)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test # Analiza vulnerabilidades en paquetes instalados





name: Análisis de Seguridad Dinámico (DAST) Frontend

on:
  push:
    branches:
      - master

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Escaneo DAST con OWASP ZAP
    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: '[https://pry-bina-front.vercel.app](https://pry-bina-front.vercel.app)'


name: Snyk Security Scan (IAST/SAST)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  snyk-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código fuente
        uses: actions/checkout@v3

      - name: Configurar entorno Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22' # Ajustado a tu versión actual de Node.js

      - name: Instalar dependencias del proyecto
        run: npm install

      - name: Ejecutar Análisis de Snyk Code (Data Flow)
        uses: snyk/actions/node@master
        env:
          # Este token lo debes configurar en los secretos de GitHub
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          # Configurado para que la acción solo "falle" (se ponga en rojo) si detecta vulnerabilidades Altas o Críticas
          args: --severity-threshold=high
